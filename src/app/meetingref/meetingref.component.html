<div class="NewHeader">
    <h1 mat-dialog-title>Meeting Ref</h1>
</div>

<div class="meeting-container">

  <!-- LEFT: Agenda -->
  <div class="agenda-section">

    <div class="section-title">
      Agenda
      <span class="badge">{{ agenda.length }} items</span>
    </div>

    <div class="agenda-list">
      <div class="agenda-card" *ngFor="let item of agenda; let i = index">
        <div class="agenda-index">{{ i + 1 }}</div>
        <div class="agenda-text">{{ item }}</div>
      </div>
    </div>

  </div>

  <!-- RIGHT: Attended -->
  <div class="attended-section">

    <div class="section-title">
      Attended
      <span class="badge">{{ attended.length }}</span>
    </div>

    <div class="attended-grid">
      <div class="attended-card" *ngFor="let user of attended">

        <div class="avatar">
          {{ user.initials }}
        </div>

        <div class="user-info">
          <div class="name">{{ user.name }}</div>
          <div class="role">{{ user.role }}</div>
        </div>

      </div>
    </div>

  </div>

</div>

<mat-dialog-actions align="end" style="margin-top: 10px;">
    <button mat-raised-button  style="background-color: lightgray; color: red" (click)="close()">
        <mat-icon>cancel</mat-icon>Close
    </button>
</mat-dialog-actions>
