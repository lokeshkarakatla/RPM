<div class="timings-card">

  <div class="timings-header">
    <div class="title-block">
      <span class="eyebrow">Working Schedule</span>
      <h2 class="title">{{ currentMonth }} {{ currentYear }}</h2>
    </div>

    <div class="month-nav">
      <button type="button" class="nav-btn" aria-label="Previous month" (click)="previousMonth()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="nav-btn" aria-label="Next month" (click)="nextMonth()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="legend">
    <button
      type="button"
      class="legend-item"
      [class.inactive]="isTypeHidden('working')"
      (click)="toggleType('working')">
      <span class="legend-dot dot-working"></span>
      Working Day
    </button>

    <button
      type="button"
      class="legend-item"
      [class.inactive]="isTypeHidden('off')"
      (click)="toggleType('off')">
      <span class="legend-dot dot-off"></span>
      Week Off
    </button>

    <button
      type="button"
      class="legend-item"
      [class.inactive]="isTypeHidden('weekend')"
      (click)="toggleType('weekend')">
      <span class="legend-dot dot-weekend"></span>
      Weekend
    </button>
  </div>

  <div class="schedule-table">

    <div class="table-header-row">
      <span class="col-week">Week</span>
      <span class="col-day">Mon</span>
      <span class="col-day">Tue</span>
      <span class="col-day">Wed</span>
      <span class="col-day">Thu</span>
      <span class="col-day">Fri</span>
      <span class="col-day weekend-label">Sat</span>
      <span class="col-day weekend-label">Sun</span>
    </div>

    <div class="table-row" *ngFor="let week of weeks">
      <span class="col-week">{{ week.weekNumber }}</span>

      <!-- Mon -->
      <div class="col-day">
        <button type="button" class="day-cell" [ngClass]="getStatusClass(week.days[1].type)"
          [class.hidden-type]="isTypeHidden(week.days[1].type)"
          [disabled]="!week.days[1].isCurrentMonth || week.days[1].type === 'weekend'"
          (click)="toggleDayType(week.days[1])">
          <span *ngIf="getStatusIcon(week.days[1].type)">{{ getStatusIcon(week.days[1].type) }}</span>
        </button>
      </div>

      <!-- Tue -->
      <div class="col-day">
        <button type="button" class="day-cell" [ngClass]="getStatusClass(week.days[2].type)"
          [class.hidden-type]="isTypeHidden(week.days[2].type)"
          [disabled]="!week.days[2].isCurrentMonth || week.days[2].type === 'weekend'"
          (click)="toggleDayType(week.days[2])">
          <span *ngIf="getStatusIcon(week.days[2].type)">{{ getStatusIcon(week.days[2].type) }}</span>
        </button>
      </div>

      <!-- Wed -->
      <div class="col-day">
        <button type="button" class="day-cell" [ngClass]="getStatusClass(week.days[3].type)"
          [class.hidden-type]="isTypeHidden(week.days[3].type)"
          [disabled]="!week.days[3].isCurrentMonth || week.days[3].type === 'weekend'"
          (click)="toggleDayType(week.days[3])">
          <span *ngIf="getStatusIcon(week.days[3].type)">{{ getStatusIcon(week.days[3].type) }}</span>
        </button>
      </div>

      <!-- Thu -->
      <div class="col-day">
        <button type="button" class="day-cell" [ngClass]="getStatusClass(week.days[4].type)"
          [class.hidden-type]="isTypeHidden(week.days[4].type)"
          [disabled]="!week.days[4].isCurrentMonth || week.days[4].type === 'weekend'"
          (click)="toggleDayType(week.days[4])">
          <span *ngIf="getStatusIcon(week.days[4].type)">{{ getStatusIcon(week.days[4].type) }}</span>
        </button>
      </div>

      <!-- Fri -->
      <div class="col-day">
        <button type="button" class="day-cell" [ngClass]="getStatusClass(week.days[5].type)"
          [class.hidden-type]="isTypeHidden(week.days[5].type)"
          [disabled]="!week.days[5].isCurrentMonth || week.days[5].type === 'weekend'"
          (click)="toggleDayType(week.days[5])">
          <span *ngIf="getStatusIcon(week.days[5].type)">{{ getStatusIcon(week.days[5].type) }}</span>
        </button>
      </div>

      <!-- Sat -->
      <div class="col-day weekend-col">
        <button type="button" class="day-cell" [ngClass]="getStatusClass(week.days[6].type)"
          [class.hidden-type]="isTypeHidden(week.days[6].type)"
          [disabled]="!week.days[6].isCurrentMonth || week.days[6].type === 'weekend'"
          (click)="toggleDayType(week.days[6])">
          <span *ngIf="getStatusIcon(week.days[6].type)">{{ getStatusIcon(week.days[6].type) }}</span>
        </button>
      </div>

      <!-- Sun -->
      <div class="col-day weekend-col">
        <button type="button" class="day-cell" [ngClass]="getStatusClass(week.days[0].type)"
          [class.hidden-type]="isTypeHidden(week.days[0].type)"
          [disabled]="!week.days[0].isCurrentMonth || week.days[0].type === 'weekend'"
          (click)="toggleDayType(week.days[0])">
          <span *ngIf="getStatusIcon(week.days[0].type)">{{ getStatusIcon(week.days[0].type) }}</span>
        </button>
      </div>

    </div>

  </div>

</div>
