<div class="NewHeader">
  <h1 mat-dialog-title>
    <span>{{ data ? 'Update' : 'Add' }} Lookup</span>
  </h1>
</div>

<div mat-dialog-content>
  <form class="form-horizontal">
    <div class="form-group">
      <label class="control-label col-sm-3 add-member-label">Code Master: </label>
      <div class="col-sm-8">
        <mat-select class="form-control bac" name="codeMasterName" [(ngModel)]="codeMasterName" placeholder="Select Code Master" required>
          <mat-option value="Side View">Side View</mat-option>
          <mat-option value="Face View">Face View</mat-option>
          <mat-option value="Demerit">Demerit</mat-option>
          <mat-option value="Process Stage">Process Stage</mat-option>
        </mat-select>
      </div>
    </div>

    <div class="form-group">
      <label class="control-label col-sm-3 add-member-label">Lookup Name: </label>
      <div class="col-sm-8">
        <input type="text" name="lookupName" [(ngModel)]="lookupName" class="form-control bac" id="name" placeholder="Enter Lookup Name">
      </div>
    </div>
  </form>
</div>



<mat-dialog-actions align="end" style="    margin-right: 41px;">

  <button mat-raised-button (click)="close()" style="background-color: lightgray; color: red">
    <mat-icon>cancel</mat-icon> Close
  </button>
  <button mat-raised-button color="primary" class="btn-primary" (click)="saveLookup()">
    <mat-icon style="font-size:20px" class="mt-1">save</mat-icon>
    <span style="margin-left: 5px;">{{ data ? ' Update' : ' Save'}}</span>
  </button>
  
</mat-dialog-actions>
