        </button>
        <button mat-raised-button color="primary" (click)="openAddModal()">
          <mat-icon style="vertical-align: middle; margin-right: 4px;">add</mat-icon> Add Group
        </button>
      </div>
    </div>

    <!-- Groups Table -->
    <div class="row" style="margin-left: 0; margin-right: 0; width: 100%;">
      <div class="col-sm-12" style="padding: 0; width: 100%;">
        <div id="grid-table-container" class="table-responsive" style="display: block; width: 100%; border: 1px solid #cbd5e1; border-radius: 8px;">
          <table id="example2" class="table table-bordered table-hover" style="width: 100%; border-collapse: collapse; margin-bottom: 0;">
            <thead class="tbl-head">
              <tr>
                <th class="text-center" style="background-color: #3F3F3F; color: white; width: 120px;">Actions</th>
                <th style="background-color: #3F3F3F; color: white;">Group Name</th>
                <th class="text-center" style="background-color: #3F3F3F; color: white; width: 150px;">Team</th>
                <th style="background-color: #3F3F3F; color: white; width: 150px;">Status</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let g of filteredGroupsList; let i = index">
                <td class="text-center" style="vertical-align: middle;">
                  <div style="display: flex; gap: 15px; justify-content: center; align-items: center;">
                    <a style="cursor: pointer;" matTooltip="Edit Group" (click)="openEditModal(g, i)">
                      <i class="fa fa-edit" style="color: cornflowerblue; font-size: 16px;"></i>
                    </a>
                    <a style="cursor: pointer;" matTooltip="Delete Group" (click)="deleteGroup(i)">
                      <i class="fa fa-trash text-danger" style="font-size: 16px;"></i>
                    </a>
                  </div>
                </td>
                <td style="vertical-align: middle;">{{ g.name }}</td>
                <td class="text-center" style="vertical-align: middle;">
                  <a class="team-link" style="color: #1976d2; font-weight: bold; cursor: pointer;">{{ g.team }}</a>
                </td>
                <td style="vertical-align: middle;">
                  <span style="color: green; font-weight: 500;">{{ g.status }}</span>
                </td>
              </tr>
              <tr *ngIf="filteredGroupsList.length === 0">
                <td colspan="4" class="text-center" style="padding: 20px; color: #64748b; font-style: italic;">No records found.</td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <!-- Table Footer / Pagination -->
        <div class="table-footer" style="display: flex; justify-content: flex-end; align-items: center; padding: 10px 15px; border: 1px solid #cbd5e1; border-top: none; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; background: #f8fafc; width: 100%; box-sizing: border-box;">
          <div style="display: flex; gap: 15px; align-items: center; font-size: 13px; color: #64748b;">
            <span>Items per page: 10</span>
            <span>Showing 1 - {{ filteredGroupsList.length }} of {{ filteredGroupsList.length }}</span>
            <div style="display: flex; gap: 5px;">
              <button mat-icon-button disabled><mat-icon>chevron_left</mat-icon></button>
              <button mat-icon-button disabled><mat-icon>chevron_right</mat-icon></button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- ============ ADD GROUP MODAL OVERLAY ============ -->
<div class="bl-modal-overlay" *ngIf="showAddModal" (click)="closeAddModal()">
  <div class="bl-modal modal-wide" (click)="$event.stopPropagation()" style="max-width: 500px; display: flex; flex-direction: column;">
    <!-- Header -->
    <div class="NewHeader" style="flex-shrink: 0;">
      <h3 style="padding-top:10px; margin: 0; color: white;">Add Group</h3>
    </div>
    
    <!-- Body -->
    <div class="modal-body-scrollable" style="flex: 1; overflow-y: auto; padding: 20px;">
      <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
        <div class="col-sm-4 text-end">
          <label class="control-label" style="font-weight: 500; margin: 0;">Group Name * :</label>
        </div>
        <div class="col-sm-8">
          <input type="text" class="form-control" [(ngModel)]="newGroupName" placeholder="Enter group name" style="height: 35px;" />
        </div>
      </div>
      
      <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
        <div class="col-sm-4 text-end">
          <label class="control-label" style="font-weight: 500; margin: 0;">Team Members * :</label>
        </div>
        <div class="col-sm-8">
          <input type="number" class="form-control" [(ngModel)]="newGroupTeam" placeholder="0" style="height: 35px;" />
        </div>
      </div>

      <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
        <div class="col-sm-4 text-end">
          <label class="control-label" style="font-weight: 500; margin: 0;">Status * :</label>
        </div>
        <div class="col-sm-8">
          <mat-select placeholder="Select Status" class="form-control" [(ngModel)]="newGroupStatus" style="height: 35px; line-height: 24px; padding-top: 5px;">
            <mat-option value="Active">Active</mat-option>
            <mat-option value="Inactive">Inactive</mat-option>
          </mat-select>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="bl-modal__actions" style="flex-shrink: 0; padding: 15px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 10px;">
      <button mat-raised-button class="btn-default" (click)="closeAddModal()" style="background-color: lightgray; color: red;">Cancel</button>
      <button mat-raised-button color="primary" (click)="saveNewGroup()">Create</button>
    </div>
  </div>
</div>

<!-- ============ EDIT GROUP MODAL OVERLAY ============ -->
<div class="bl-modal-overlay" *ngIf="showEditModal" (click)="closeEditModal()">
  <div class="bl-modal modal-wide" (click)="$event.stopPropagation()" *ngIf="editingGroup" style="max-width: 500px; display: flex; flex-direction: column;">
    <!-- Header -->
    <div class="NewHeader" style="flex-shrink: 0;">
      <h3 style="padding-top:10px; margin: 0; color: white;">Edit Group</h3>
    </div>
    
    <!-- Body -->
    <div class="modal-body-scrollable" style="flex: 1; overflow-y: auto; padding: 20px;">
      <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
        <div class="col-sm-4 text-end">
          <label class="control-label" style="font-weight: 500; margin: 0;">Group Name * :</label>
        </div>
        <div class="col-sm-8">
          <input type="text" class="form-control" [(ngModel)]="editingGroup.name" placeholder="Enter group name" style="height: 35px;" />
        </div>
      </div>
      
      <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
        <div class="col-sm-4 text-end">
          <label class="control-label" style="font-weight: 500; margin: 0;">Team Members * :</label>
        </div>
        <div class="col-sm-8">
          <input type="number" class="form-control" [(ngModel)]="editingGroup.team" placeholder="0" style="height: 35px;" />
        </div>
      </div>

      <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
        <div class="col-sm-4 text-end">
          <label class="control-label" style="font-weight: 500; margin: 0;">Status * :</label>
        </div>
        <div class="col-sm-8">
          <mat-select placeholder="Select Status" class="form-control" [(ngModel)]="editingGroup.status" style="height: 35px; line-height: 24px; padding-top: 5px;">
            <mat-option value="Active">Active</mat-option>
            <mat-option value="Inactive">Inactive</mat-option>
          </mat-select>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="bl-modal__actions" style="flex-shrink: 0; padding: 15px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 10px;">
      <button mat-raised-button class="btn-default" (click)="closeEditModal()" style="background-color: lightgray; color: red;">Cancel</button>
      <button mat-raised-button color="primary" (click)="updateGroup()">Save</button>
    </div>
  </div>
</div>
