<div class="groups-container mt-5">
  
  <div class="groups-header">
    <div class="header-titles">
      <h1>Groups</h1>
      <p>Manage groups and staff allocation</p>
    </div>
  </div>

  <!-- Search & Toolbar -->
  <div class="groups-toolbar">
    <div class="search-input-wrapper">
      <mat-icon class="search-icon">search</mat-icon>
      <input type="text" class="search-input" [(ngModel)]="searchQuery" placeholder="Search groups..." />
    </div>

    <button type="button" class="toolbar-btn toolbar-btn--filter" (click)="toggleFilter()">
      <mat-icon>filter_list</mat-icon> Filter
    </button>

    <button type="button" class="toolbar-btn toolbar-btn--add" (click)="openAddModal()">
      <mat-icon>add</mat-icon> Add Group
    </button>
  </div>

  <!-- Keyword Search Expandable Panel -->
  <div class="filter-expanded-panel" *ngIf="filterToggle">
    <span class="keyword-label">Keyword:</span>
    <div class="keyword-input-wrapper">
      <input type="text" class="keyword-input" [(ngModel)]="filterKeyword" placeholder="Search by Keyword" />
    </div>
    <button type="button" class="refresh-btn" (click)="clearFilter()" matTooltip="Clear Keyword">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>

  <!-- Groups Table Panel -->
  <div class="table-panel">
    <table class="groups-table">
      <thead>
        <tr>
          <th>Group Name</th>
          <th class="text-center">Team</th>
          <th>Status</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let g of filteredGroupsList; let i = index">
          <td class="group-name-cell">{{ g.name }}</td>
          <td class="team-cell text-center">
            <a class="team-link">{{ g.team }}</a>
          </td>
          <td class="status-cell">
            <span class="status-active">{{ g.status }}</span>
          </td>
          <td class="actions-cell text-center">
            <div class="action-buttons">
              <i class="fa fa-pencil text-primary action-icon" (click)="openEditModal(g, i)" matTooltip="Edit Group"></i>
              <i class="fa fa-trash text-danger action-icon" (click)="deleteGroup(i)" matTooltip="Delete Group"></i>
            </div>
          </td>
        </tr>
        <tr *ngIf="filteredGroupsList.length === 0">
          <td colspan="4" class="empty-row">No records found.</td>
        </tr>
      </tbody>
    </table>

    <!-- Pagination -->
    <div class="groups-pagination">
      <div class="items-per-page">
        <span>Items per page:</span>
        <select class="page-size-select">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
      </div>
      <div class="pagination-summary">
        Showing 1 - {{ filteredGroupsList.length }} of {{ filteredGroupsList.length }}
      </div>
      <div class="pagination-controls">
        <button type="button" class="pagination-btn" disabled>
          <mat-icon>chevron_left</mat-icon>
        </button>
        <button type="button" class="pagination-btn" disabled>
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ============ ADD GROUP MODAL OVERLAY ============ -->
<div class="bl-modal-overlay" *ngIf="showAddModal" (click)="closeAddModal()">
  <div class="bl-modal" (click)="$event.stopPropagation()">
    <h3>Add Group</h3>
    
    <label class="modal-label">Group Name</label>
    <input type="text" class="bl-modal__input" [(ngModel)]="newGroupName" placeholder="Enter group name" />
    
    <label class="modal-label">Team Members count</label>
    <input type="number" class="bl-modal__input" [(ngModel)]="newGroupTeam" placeholder="0" />
    
    <label class="modal-label">Status</label>
    <select class="bl-modal__select" [(ngModel)]="newGroupStatus">
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>

    <div class="bl-modal__actions">
      <button class="bl-btn bl-btn--cancel" (click)="closeAddModal()">Cancel</button>
      <button class="bl-btn bl-btn--create" (click)="saveNewGroup()">Create</button>
    </div>
  </div>
</div>

<!-- ============ EDIT GROUP MODAL OVERLAY ============ -->
<div class="bl-modal-overlay" *ngIf="showEditModal" (click)="closeEditModal()">
  <div class="bl-modal" (click)="$event.stopPropagation()" *ngIf="editingGroup">
    <h3>Edit Group</h3>
    
    <label class="modal-label">Group Name</label>
    <input type="text" class="bl-modal__input" [(ngModel)]="editingGroup.name" placeholder="Enter group name" />
    
    <label class="modal-label">Team Members count</label>
    <input type="number" class="bl-modal__input" [(ngModel)]="editingGroup.team" placeholder="0" />
    
    <label class="modal-label">Status</label>
    <select class="bl-modal__select" [(ngModel)]="editingGroup.status">
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>

    <div class="bl-modal__actions">
      <button class="bl-btn bl-btn--cancel" (click)="closeEditModal()">Cancel</button>
      <button class="bl-btn bl-btn--create" (click)="updateGroup()">Save</button>
    </div>
  </div>
</div>
