<div class="page-header ms-5">
  <h3 class="page-title">Documents </h3>
</div>


<button mat-raised-button color="primary" class="pull-right  btn-primary  mt-3 mb-4 me-4  " (click)=" adddocument(null)">
    <mat-icon>add</mat-icon> Add Document
</button>


<div class="table-wrapper">

<table matSort id="example2" class="table table-bordered table-hover">
    <thead class="tbl-head">
        <tr>
            <th class="text-center">Date</th>
           
           <th class="text-center subject-col">Subject</th>
            <!-- <th class="text-center"> Document Type</th> -->
            <th class="theadcolor text-center">View</th>
            <th class="theadcolor text-center">Actions</th>
        </tr>
    </thead>
    <tbody>
       <tr *ngFor="let item of values">

  <td class="text-center text-nowrap">
    {{ item.date }} 
  </td>

 

  <td class="text-center subject-col">
    {{ item.subject }}
  </td>

  <td class="text-center text-nowrap">
    <mat-icon>library_books</mat-icon>
  </td>

  <td class="text-center text-nowrap">
    <a class="me-2" matTooltip="Edit" (click)="adddocument(null)">
      <i class="fa fa-edit text-primary"></i>
    </a>
    <a matTooltip="Delete">
      <i class="fa fa-trash text-danger"></i>
    </a>
  </td>

</tr>
    </tbody>
</table>

</div>


<div class="col-lg-12 margin-top:50px">
    <div class="col-sm-3.5 pull-right mt-5">


        <!-- <button type="button" class="btn btn-outline-success" style="margin-right: 10px; height: 41px;">Save
            Draft</button> -->
        <button mat-raised-button class="" type="button"
            style="color: rgba(252, 253, 252, 0.926); background-color: #3262a8; ">
            <mat-icon>save</mat-icon>&nbsp; Submit
        </button>
    </div>
</div>
