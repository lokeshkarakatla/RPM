<!-- Add FilterTabs -->
<div class="container-fluid" style="padding-right: 7px; padding-left: 1px;">
    <div class="w-100">
        <div class="flex-p">
            <div class="row wrap">
                <div class="col-sm-12 no-padding">
                    <div class="row-wrap">
                        <div class="w-100">
                            <div class="row">
                                <div class="col-xs-6"></div>
                                <div class="col-xs-6">
                                    <div class="col-xs-6"></div>

                                    <div class="col-xs-6" style="margin-left: -13px;">
                                        <div class="">


                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Filter UI -->
<div fxLayout="row wrap" *ngIf="filterToggle">
    <div fxFlex="100" fxFlex.gt-sm fxFlex.sm class="flex-p w-100 margins" style="margin-right: 7px;">
        <mat-card class="filter">
            <mat-card-content>
                <div class="row">
                    <div class="col-sm-5">
                        <div class="col-sm-3">
                            <label class="pull-right" style="margin-top: 6px;">Step:</label>
                        </div>
                        <div class="col-sm-6">
                            <mat-select class="form-control" placeholder="Select step" required>
                                <mat-option [value]="0">D1</mat-option>
                                <mat-option [value]="1">D2</mat-option>
                                <mat-option [value]="2">D3</mat-option>
                                <mat-option [value]="4">D4 A</mat-option>
                                <mat-option [value]="4">D4 B</mat-option>
                                <mat-option [value]="0">D5</mat-option>
                                <mat-option [value]="1">D6</mat-option>
                                <mat-option [value]="2">D7</mat-option>
                            </mat-select>
                        </div>
                    </div>


                    <div class="col-sm-5">
                        <div class="col-sm-3">
                            <label class="pull-right" style="margin-top: 6px;">Status:</label>
                        </div>
                        <div class="col-sm-6">
                            <mat-select class="form-control" placeholder="Select Status" required>
                                <mat-option *ngFor="let option of Status" [value]="option.value">
                                    {{option.name}}
                                </mat-option>

                            </mat-select>
                        </div>
                    </div>


                    <div class="col-sm-2">
                        <button mat-raised-button class="pull-right btn-primary" style="margin-left: 5px;">
                            <mat-icon>youtube_searched_for</mat-icon> Go&nbsp;&nbsp;&nbsp;&nbsp;
                        </button>
                        <button mat-raised-button style="background-color:#37474f; color:#fff !important;"
                            class="pull-right">
                            <mat-icon>settings_backup_restore</mat-icon> Clear
                        </button>
                    </div>


                </div>
            </mat-card-content>
        </mat-card>
    </div>

</div>
<!-- Table -->
<div class="col-sm-12">


    <div class="container" style="padding-right: 7px; padding-left: 1px;">
    <div fxLayout="row wrap" #resizedDiv>
        <div class="flex-p w-100 sizeAlign">
            <div class="row">
                <div class="col-sm-12">
                    <div id="grid-table-container" class="table-responsive">
                       <table matSort id="example2" class="table table-bordered table-hover" style="table-layout: fixed; width: 100%;">
                            <thead class="tbl-head">
                                <tr>
                                    <th class="text-center" style="width: 80px !important;">Actions</th>
                                    <th class="text-center" style="width: 80px !important;">Status</th>
                                    <th class="text-center" style="width: 60px !important;">Step Code</th>
                                    <th style="width: 100px !important;">Step Name</th>
                                    <th class="text-center" style="width: 50px !important;">Description</th>
                                    <th class="text-center" style="width: 90px !important;">Document Types</th>
                                    <th class="text-center" style="width: 80px !important;">Checklist</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let item of values; let i = index">

                                    <!-- Actions: just 2 icons -->
                                    <td class="text-center editDel" style="width: 80px !important;">
                                        <a style="cursor: pointer; margin-right: 10px;" matTooltip="Edit"
                                            (click)="addmodule(item)">
                                            <i class="fa fa-edit" style="color: cornflowerblue"></i>
                                        </a>
                                        <a>
                                            <i class="fa fa-trash red" matTooltip="Delete"
                                                (click)="deleteConfirmation()" style="cursor: pointer;"></i>
                                        </a>
                                    </td>

                                    <!-- Status: short text Active/Inactive -->
                                    <td class="text-center" style="width: 80px !important;">
                                        <a [ngStyle]="{'color': item.IsActive ? 'blue' : 'red', 'cursor': 'pointer'}"
                                            [ngClass]="{'disable-custom': !canUpdate}">
                                            <span *ngIf="!item.IsActive" (click)="Confirmation(item)"
                                                style="color: red;">Inactive</span>
                                            <span *ngIf="item.IsActive" (click)="Confirmation(item)"
                                                style="color: blue;">Active</span>
                                        </a>
                                    </td>

                                    <!-- Step Code: short code -->
                                    <td class="text-center" style="width: 60px !important;">
                                        {{ item.stepcode }}
                                    </td>

                                    <!-- Step Name: slightly wider for text -->
                                    <td style="width: 100px !important;">
                                        {{ item.stepname }}
                                    </td>

                                    <!-- Description: single icon -->
                                    <td class="text-center" style="width: 50px !important;">
                                        <i class="fa fa-info-circle"
                                            style="font-size: 20px; color: blue; cursor: pointer;"
                                            (click)="adddesc()"></i>
                                    </td>

                                    <!-- Document Types: single number -->
                                    <td class="text-center"
                                        style="width: 90px !important; color: blue; cursor: pointer;"
                                        (click)="adddocument()">
                                        3
                                    </td>

                                    <!-- Checklist: single number -->
                                    <td class="text-center"
                                        style="width: 80px !important; color: blue; cursor: pointer;"
                                        (click)="addchecklist()">
                                        5
                                    </td>

                                </tr>
                            </tbody>
                        </table>
                        <mat-paginator [length]="totalSize" [pageIndex]="currentPage" [pageSize]="pageSize"
                            [pageSizeOptions]="[5, 10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
