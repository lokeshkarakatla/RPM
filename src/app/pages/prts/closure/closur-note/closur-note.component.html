<div class="page-header ms-5">
    <h3 class="page-title">Closure </h3>
    <p class="header-info mb-0">
        <span class="fw-bold">Ref No:</span>
        PSR-24001

        <span class="ms-3 fw-bold">Subject:</span>
        Paint Defect
    </p>
</div>

<div class="top-section ms-5">

    <!-- Tabs -->
    <div class="pills">
        <ul class="nav nav-pills">
            <li>
                <a mat-raised-button class="navtabWidth" [routerLink]="['../closure']">
                    Documents
                </a>
            </li>
            <li>
                <a mat-raised-button class="navtabWidth active-tab" [routerLink]="['../closure-note']">
                    Notes
                </a>
            </li>
        </ul>
    </div>

</div>



<div class="editor-container ms-5">
    <quill-editor [(ngModel)]="content" [modules]="modules" [styles]="{height: '400px'}"
        placeholder="Insert text here ...">
    </quill-editor>
</div>






<div class="editor-footer d-flex justify-content-end my-3">
    <button mat-raised-button (click)="back()" class="me-2" style="color:#070a07; background-color:#e0e0e0;">
        <mat-icon>fast_rewind</mat-icon> Back
    </button>

    <button mat-raised-button style="color:#fbfdfb; background-color:#0a5db6;">
        <mat-icon>save</mat-icon> Save
    </button>
</div>
