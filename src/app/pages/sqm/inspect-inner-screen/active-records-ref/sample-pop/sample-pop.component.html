<div class="container-fluid p-3">
  <div class="d-flex justify-content-between align-items-start mb-4">
    <div>
      <p style="margin: 0; font-size: 14px;">Reference :</p>
      <p style="margin: 0; font-size: 14px;">Part family / Part Name /</p>
      <p style="margin: 0; font-size: 14px;">Inspection No 2026/ENG/GS/00123</p>
    </div>
      <button
      mat-raised-button
      style="background-color: #808080; color: white; margin-right: 10px;"
      >

      <mat-icon>arrow_back</mat-icon>
      Back

    </button>
  </div>

  <div class="table-responsive bg-white shadow-sm" style="border: 1px solid #e0e0e0; border-radius: 4px; overflow-x: auto;">
    <table class="custom-grid-table" style="white-space: nowrap; width: 100%; margin-bottom: 0;">
      <thead>
        <tr>
          <th>Parameter</th>
          <th class="text-center">Spec</th>
          <th class="text-center">Unit</th>
          <th class="text-center">Min</th>
          <th class="text-center">Max</th>
          <th class="text-center">Actual</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of tableData">
          <td>{{ item.parameter }}</td>
          <td class="text-center">{{ item.spec }}</td>
          <td class="text-center">{{ item.unit }}</td>
          <td class="text-center">{{ item.min }}</td>
          <td class="text-center">{{ item.max }}</td>
          <td class="text-center" style="padding: 6px 12px;">
            <input type="text" [(ngModel)]="item.actual" class="form-control form-control-sm" style="width: 100%; min-width: 80px; text-align: center;">
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="d-flex justify-content-end mt-4">
       <button
      mat-raised-button
      class="custom-save-btn"
      style="background-color: rgb(0, 153, 255); ">

      <span
        class="mat-button-wrapper"
        style="color: rgb(255, 255, 255);">

        <mat-icon>save</mat-icon>
        Save

      </span>
    </button>
  </div>
</div>
