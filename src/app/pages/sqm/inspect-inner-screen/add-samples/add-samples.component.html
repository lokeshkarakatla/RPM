<div class="container-fluid p-3">
  <div class="d-flex justify-content-between align-items-start mb-4" style="width: 70%;">
      <div class="col-sm-6">
      <span style="color: rgb(0, 0, 0); cursor: pointer; margin-left:0px;font-weight: 500; font-size: 18px "  >Sample Dashboard</span>  
    <p _ngcontent-mvb-c448="" style="margin-top: 5px; ">
  <span _ngcontent-mvb-c448="" style="font-weight: bolder; font-size: 14px;">Ref No:</span>
  <span _ngcontent-mvb-c448="" style="margin: 8px; font-size: 14px">2026/ENG/098121</span>
</p>
  </div>
    <button (click)="goback()"
      mat-raised-button
      style="background-color: #808080; color: white;">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>
  </div>

  <div class="table-responsive bg-white shadow-sm" style="border: 1px solid #e0e0e0; border-radius: 4px; overflow-x: auto; width: 70%;">
    <table class="custom-grid-table" style="white-space: nowrap; width: 100%; margin-bottom: 0;">
      <thead>
        <tr>
          <th>Parameter</th>
          <th class="text-center" style="width: 12%;">Spec</th>
          <th class="text-center" style="width: 12%;">Unit</th>
          <th class="text-center" style="width: 12%;">Min</th>
          <th class="text-center" style="width: 12%;">Max</th>
          <th class="text-center" style="width: 120px;">Actual</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of tableData">
          <td>{{ item.parameter }}</td>
          <td class="text-center">{{ item.spec }}</td>
          <td class="text-center">{{ item.unit }}</td>
          <td class="text-center">{{ item.min }}</td>
          <td class="text-center">{{ item.max }}</td>
          <td class="text-center" style="padding: 6px 12px;">
            <input type="text" [(ngModel)]="item.actual" class="form-control form-control-sm" style="width: 80px; margin: 0 auto; text-align: center; border-radius: 5px; border: 1px solid #ccc;">
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="d-flex justify-content-end mt-4" style="width:70%">
    <button
      mat-raised-button
      class="custom-save-btn"
      style="background-color: rgb(0, 153, 255);">
      <span class="mat-button-wrapper" style="color: rgb(255, 255, 255);">
        <mat-icon>save</mat-icon>
        Save
      </span>
    </button>
  </div>
</div>
