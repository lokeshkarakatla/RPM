<div class="NewHeader">
    <h3 style="padding-top:10px; padding-left: 20px;">
        {{data ? 'Update' : 'Add'}} Objective Audit
    </h3>
</div>

<div mat-dialog-content class="mt-3">
    <form class="form-horizontal">
        <div class="col-sm-12">
            
            <div class="form-group row mb-2">
                <label class="control-label col-sm-4">Part Family <span style="color: red;">*</span></label>
                <div class="col-sm-8">
                    <mat-select class="form-control" placeholder="Select Part Family Name">
                        <mat-option value="family1">Engine Components</mat-option>
                        <mat-option value="family2">Braking Systems</mat-option>
                    </mat-select>
                </div>
            </div>

            <div class="form-group row mb-2">
                <label class="control-label col-sm-4">Parts : <span style="color: red;">*</span></label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" placeholder="Enter Parts Name">
                </div>
            </div>

            <div class="form-group row mb-2">
                <label class="control-label col-sm-4">Parts Code : <span style="color: red;">*</span></label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" placeholder="Enter Parts Code">
                </div>
            </div>

            <div class="form-group row mb-2">
                <label class="control-label col-sm-4">Commodity <span style="color: red;">*</span></label>
                <div class="col-sm-8">
                    <mat-select class="form-control" placeholder="Select Commodity Name">
                        <mat-option value="casting">Casting</mat-option>
                        <mat-option value="forging">Forging</mat-option>
                        <mat-option value="machining">Machining</mat-option>
                    </mat-select>
                </div>
            </div>

        </div>
    </form>
</div>

<mat-dialog-actions align="end" style="margin-right: 14px; margin-top: 20px;">
    <button mat-raised-button class="ms-2" (click)="close()"
        style="background-color: lightgray; color: red; margin-right: 12px;">
        <mat-icon>cancel</mat-icon> Close
    </button>
    <button type="button" class="btn btn-outline-success" style="margin-right: 10px; height: 41px;">Save Draft</button>
    <button mat-raised-button color="primary" [mat-dialog-close]="'test'">
        <mat-icon>save</mat-icon><span>{{data ? 'Update' : 'Submit'}}</span>
    </button>
</mat-dialog-actions>
