<div class="NewHeader">
    <h3 *ngIf="!data" style="padding-top:10px; font-size: 24px; ">Add Parameter</h3>
     
</div>
<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-2" style="margin-bottom: 10px;">
            <div class="m-auto pills pt-2 pr-0">
                <ul class="nav col-12 flex-column pr-0">
                    <li class="nav-item" style="margin-top: 10px;"
                        [ngClass]=" addStep == 1 ? 'active nav-item' : 'nav-item'" (click)="changeAddStep(1)"
                        routerLinkActive="active">
                        <a mat-raised-button class="nav-link text-left py-2 width ">Overview
                        </a>
                    </li>
                    <li class="nav-item" style="margin-top: 10px;"
                        [ngClass]=" addStep == 2 ? 'active nav-item': 'nav-item'" (click)="changeAddStep(2)"
                        routerLinkActive="active">
                        <a mat-raised-button class="nav-link text-left py-2 width">CAPA
                        </a>
                    </li>
                </ul>
            </div>
        </div>

      <div *ngIf="addStep == 1" class="col-sm-10" style="margin-top: 0px;padding-left:20px;">
    
<div mat-dialog-content>
    <form class="form-horizontal">
        <div class="col-sm-6">
            <div class="form-group">
                <label class="control-label col-sm-4  ">Parameter : </label>
                <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Parameter">
                </div>
            </div>


            <div class="form-group">
                <label class="control-label col-sm-4  ">Spec  : </label>
                  <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Spec">
                </div>
            </div>

               <div class="form-group">
                <label class="control-label col-sm-4  ">Min  : </label>
                  <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Min">
                </div>
            </div>

               <div class="form-group">
                <label class="control-label col-sm-4  ">Max  : </label>
                  <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Max">
                </div>
            </div>


               <div class="form-group">
                <label class="control-label col-sm-4  ">Special  : </label>
                  <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Special">
                </div>
            </div>


               <div class="form-group">
                <label class="control-label col-sm-4  ">Method  : </label>
                  <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Method">
                </div>
            </div>

         
        
            <!-- <div class="form-group">
                <label class="control-label col-sm-4  ">Interior Trim: </label>
                <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <mat-select class="form-control" placeholder="Select Interior Trim" required>
                        <mat-option [value]="0">High</mat-option>
                        <mat-option [value]="1">Medium</mat-option>
                        <mat-option [value]="2">Low</mat-option>
                    </mat-select>
                </div>
            </div> -->
        </div>
        <div class="col-sm-6">
            <div class="col-sm-12">
            



                <div class="form-group">
                    <label class="control-label col-sm-4  ">S1: </label>
                    <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter S1 Value">
                </div>
                </div>



                <div class="form-group">
                    <label class="control-label col-sm-4  ">S2: </label>
                    <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter S2 Value">
                </div>
                </div>



                <div class="form-group">
                    <label class="control-label col-sm-4  ">S3: </label>
                    <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter S3 Value">
                </div>
                </div>


                <div class="form-group">
                    <label class="control-label col-sm-4  ">S4: </label>
                    <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter S4 Value">
                </div>
                </div>

                <div class="form-group">
                    <label class="control-label col-sm-4  ">S5: </label>
                    <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter S5 Value">
                </div>
                </div>

                <div class="form-group">
                    <label class="control-label col-sm-4  ">Remarks: </label>
                    <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Remarks">
                </div>
                </div>
                 
                
                
         
            </div>
        </div>
    </form>
</div>

    <mat-dialog-actions align="end" style="margin-top: 15px; margin-bottom: -5px;">
        <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red;margin-right: 5px;">
            <mat-icon>cancel</mat-icon> Close
        </button>
        <button mat-raised-button type="submit" class="save" color="primary" style="margin-right: 17px;" (click)="changeAddStep(2)">
            <mat-icon>save</mat-icon>Save & Next
        </button>
    </mat-dialog-actions>
</div>



        <div *ngIf="addStep == 2" class="col-sm-10" style="padding-left:50px;">
          <div class="container-fluid" style="padding: 15px 5px 0px 0px;">
    <!-- Main Flex Container -->
    <div >
        
        <!-- Left Side: Label and Resizable Textarea -->
        <div style="flex-grow: 1;">
            <div class="form-group"  style="margin-bottom: 15px;">
                <label class="control-label" style="font-weight: bold; margin-bottom: 8px; display: block;">
                    Root Cause Analysis:
                </label>
                <!-- Changed from input to textarea with vertical resize -->
                <textarea class="form-control" 
                          placeholder="Enter Root Cause Analysis" 
                          rows="1"
                          style="resize: vertical; min-height: 38px;"></textarea>
            </div>



             <div class="form-group" style="margin-bottom: 15px;">
                <label class="control-label" style="font-weight: bold; margin-bottom: 8px; display: block;">
                    Interim Corrective Action:
                </label>
                <!-- Changed from input to textarea with vertical resize -->
                <textarea class="form-control" 
                          placeholder="Enter Interim Corrective Action" 
                          rows="1"
                          style="resize: vertical; min-height: 38px;"></textarea>
            </div>



             <div class="form-group" style="margin-bottom: 15px;">
                <label class="control-label" style="font-weight: bold; margin-bottom: 8px; display: block;">
                    Permanent Corrective Action:
                </label>
                <!-- Changed from input to textarea with vertical resize -->
                <textarea class="form-control" 
                          placeholder="Enter Permanent Corrective Action" 
                          rows="1"
                          style="resize: vertical; min-height: 38px;"></textarea>
            </div>
        </div>

        <!-- Right Side: Side-by-Side Horizontal Buttons -->
        <div style="display: flex;justify-content: flex-end; gap: 8px; ">
            <button mat-raised-button class="add-dark-hover btn-default" (click)="close()"
                style="background-color: #f0f0f0; color: red; min-width: 110px; display: flex; align-items: center; justify-content: center;">
                <mat-icon style="margin-right: 4px;">cancel</mat-icon>
                Close
            </button>

            <button mat-raised-button (click)="changeAddStep(1)" 
                style="min-width: 110px; display: flex; align-items: center; justify-content: center;">
                <mat-icon style="margin-right: 4px;">arrow_back</mat-icon>
                Back
            </button>
        </div>

    </div>
</div>
        </div>
    </div>
</div>
