<div class="container-fluid py-4">
  <form>
    <div class="row">
      
      <div class="col-sm-6">
        
        <div class="row form-g*p mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Subject :</label>
          <div class="col-sm-7">
            <input type="text" formControlName="subject" placeholder="Enter Subject" class="form-control">
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Upload PDF :</label>
          <div class="col-sm-7">
            <input type="file" formControlName="pdfFile" class="form-control">
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Select Due Date :</label>
          <div class="col-sm-7">
            <input type="date" formControlName="dueDate" class="form-control">
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Select Completed Date :</label>
          <div class="col-sm-7">
            <input type="date" formControlName="completedDate" class="form-control">
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">PDCA Status :</label>
          <div class="col-sm-7">
            <mat-select formControlName="pdcaStatus" placeholder="Select PDCA Status" class="form-control custom-mat-select">
              <mat-option *ngFor="let status of pdcaOptions" [value]="status">{{ status }}</mat-option>
            </mat-select>
          </div>
        </div>

        <div class="row form-group mt-4 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Severity :</label>
          <div class="col-sm-7">
            <mat-select formControlName="severity" placeholder="Select Severity" class="form-control custom-mat-select">
              <mat-option *ngFor="let s of severityOptions" [value]="s">{{ s }}</mat-option>
            </mat-select>
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Occurrence :</label>
          <div class="col-sm-7">
            <mat-select formControlName="occurrence" placeholder="Select Occurrence" class="form-control custom-mat-select">
              <mat-option *ngFor="let o of occurrenceOptions" [value]="o">{{ o }}</mat-option>
            </mat-select>
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Detection :</label>
          <div class="col-sm-7">
            <mat-select formControlName="detection" placeholder="Select Detection" class="form-control custom-mat-select">
              <mat-option *ngFor="let d of detectionOptions" [value]="d">{{ d }}</mat-option>
            </mat-select>
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">SOD Score :</label>
          <div class="col-sm-7">
            <input type="text" formControlName="sodScore" class="form-control bg-light">
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Risk Rating :</label>
          <div class="col-sm-7">
            <input type="text" formControlName="riskRating" class="form-control input-risk" value="High">
          </div>
        </div>

        <div class="row form-group mt-3 align-items-center">
          <label class="control-label col-sm-4 font-weight-bold">Mark as Resolved:</label>
          <div class="col-sm-7">
            <mat-checkbox formControlName="isResolved" class="mt-1"></mat-checkbox>
          </div>
        </div>

      </div>

      <div class="col-sm-6">
        
        <div class="form-group mt-3">
          <label class="control-label font-weight-bold mb-2">Observations :</label>
          <textarea rows="5" formControlName="observations" placeholder="Enter Observations..." class="form-control"></textarea>
        </div>

        <div class="form-group mt-4">
          <label class="control-label font-weight-bold mb-2">Corrective Actions :</label>
          <textarea rows="5" formControlName="correctiveActions" placeholder="Enter Corrective Actions..." class="form-control"></textarea>
        </div>

        <div class="form-group mt-4">
          <label class="control-label font-weight-bold mb-2">Supplier Remarks :</label>
          <textarea rows="5" formControlName="supplierRemarks" placeholder="Enter Remarks..." class="form-control"></textarea>
        </div>

      </div>
    </div>

    <div class="row mt-5">
      <div class="col-sm-12">
        <mat-card class="gallery-container">
          
          <mat-card class="inner-card add-btn-card" (click)="fileInput.click()">
            <mat-icon class="add-icon">add</mat-icon>
          </mat-card>
          <input type="file" #fileInput style="display: none;" (change)="onFileSelected($event)" accept="image/*">

          <mat-card class="inner-card img-card" *ngFor="let img of images">
            <img [src]="img" alt="logo" class="gallery-img">
          </mat-card>

        </mat-card>
      </div>
    </div>

    <div class="row mt-4 mb-5">
      <div class="col-sm-12 d-flex justify-content-end">
        <button mat-raised-button type="submit" class="btn-save">Save</button>
      </div>
    </div>

  </form>
</div>
