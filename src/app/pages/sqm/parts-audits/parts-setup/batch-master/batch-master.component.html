<div class="toolbar-row mb-3 d-flex justify-content-end" style="width: 60%;">

      (click)="toggleFilters()">
      <mat-icon style="font-size: 18px; height: 18px; width: 18px;  margin-top:4px">filter_list</mat-icon>
      Filter
    </button>

  <button mat-raised-button color="primary" class="btn-blue" (click)="addbatchpop(null)">
    <mat-icon>add</mat-icon> Add Batch
  </button>
</div>







  <div class="filter-wrapper" *ngIf="showFilters"  style="width: 60%;">
    <mat-card class="filter-card">
      <mat-card-content>
        <div class="filter-row">
          
      <div class="filter-group">
  <label class="filter-label mb-0">Keyword :</label>
  <input type="text"  placeholder="Enter Keyword" class="custom-mat-input">
</div>

          <!-- <div class="filter-group">
            <label class="filter-label mb-0">Status :</label>
            <mat-select [(ngModel)]="selectedStatus" placeholder="Select Status" class="custom-mat-select">
              <mat-option value="Active">Active</mat-option>
              <mat-option value="Inactive">Inactive</mat-option>
            </mat-select>
          </div> -->

          <div class="button-group">
            <button mat-raised-button class="btn-go"  >
              <mat-icon>search</mat-icon> Go
            </button>
            <button mat-raised-button class="btn-clear"  >
              <mat-icon>settings_backup_restore</mat-icon> Clear
            </button>
          </div>

        </div>
      </mat-card-content>
    </mat-card>
  </div>

<div class="table-responsive">
  <table class="table table-bordered table-hover" style="width: 60%;">
    <thead class="tbl-head">
      <tr>
        <th class="text-center">Actions</th>
        <th>Part Family</th>
        <th>Part Number</th>
        <th>Batch Number</th>
        <th>Batch Date</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of mockdata">
        
        <td class="text-center">
          <a matTooltip="Edit Record" style="margin-right: 12px; cursor: pointer;" (click)="openEditDialog(item)">
            <mat-icon style="color: cornflowerblue; font-size: 20px;">edit</mat-icon>
          </a>
          <a matTooltip="Delete Record" style="cursor: pointer;" (click)="deleteConfirmation(item)">
            <mat-icon style="color: red; font-size: 20px;">delete</mat-icon>
          </a>
        </td>

        <td>{{ item.PartFamily }}</td>
        <td>{{ item.PartNumber }}</td>
        <td>{{ item.BatchNumber }}</td>
        <td>{{ item.BatchDate }}</td>
        
      </tr>

      <tr *ngIf="!mockdata || mockdata.length === 0">
        <td colspan="5" class="text-center">No records found</td>
      </tr>
    </tbody>
  </table>
</div>
