<div class="NewHeader">
    <h2 style="padding-top:0px; padding-left: 20px; font-weight: 400;font-size: 24px;">Confirmation</h2>
</div>

<div>
    <div class="row" style="margin-bottom: 12px;">
        <div class="col-sm-4">
            <label class="add-member-label mt5" style="margin-top:5px; font-weight: bold;">Completion :
                <span style="color: red;"></span></label>
        </div>

        <div class="col-sm-8" style="position: relative;">

            <input matInput [matDatepicker]="picker"
                style="height: 38px; width: 100%; padding-left: 12px; padding-right: 45px; border: 1px solid #181818; border-radius: 4px; box-sizing: border-box; background-color: white;"
                placeholder="mm/dd/yyyy">

            <mat-datepicker-toggle matSuffix [for]="picker"
                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%);">
            </mat-datepicker-toggle>

            <mat-datepicker #picker></mat-datepicker>
        </div>
    </div>

    <mat-dialog-actions align="end"
        style="margin-top: 15px; display: flex; justify-content: flex-end;margin-right: -20px;">
        <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()"
            style="background-color: lightgray; color: red;margin-right: 5px;">
            <mat-icon>cancel</mat-icon> Close
        </button>
        <button mat-raised-button type="submit" class="save" color="primary" style="margin-right: 17px;">
            <mat-icon>save</mat-icon>Save
        </button>
    </mat-dialog-actions>
</div>
