<div class="actions-container">
  <!-- Filter Bar -->
  <div class="filter-bar">
    <label class="filter-label">Commodity :</label>
    <mat-form-field appearance="outline" class="filter-field">
      <mat-select placeholder="Select Commodity">
        <mat-option value="casting">Casting</mat-option>
        <mat-option value="forging">Forging</mat-option>
        <mat-option value="machining">Machining</mat-option>
        <mat-option value="fasteners">Fasteners</mat-option>
        <mat-option value="non-metallic">Non-Metallic</mat-option>
        <mat-option value="sheet-metal">Sheet Metal</mat-option>
        <mat-option value="proprietary">Proprietary</mat-option>
      </mat-select>
    </mat-form-field>

    <label class="filter-label">Select Year :</label>
    <mat-form-field appearance="outline" class="filter-field">
      <mat-select placeholder="Select Year">
        <mat-option value="2022">2022</mat-option>
        <mat-option value="2023">2023</mat-option>
        <mat-option value="2024">2024</mat-option>
        <mat-option value="2025">2025</mat-option>
        <mat-option value="2026">2026</mat-option>
      </mat-select>
    </mat-form-field>

    <button class="go-btn" mat-raised-button>
      <mat-icon>search</mat-icon> Go
    </button>
  </div>

  <!-- Monthly Critical Actions Logged -->
  <h2 class="section-title">Monthly Critical Actions Logged</h2>
  <div class="full-chart-card">
    <highcharts-chart
      [Highcharts]="Highcharts"
      [options]="criticalOptions"
      style="width: 100%; height: 300px; display: block"
    >
    </highcharts-chart>
  </div>

  <!-- Monthly Important Actions Logged -->
  <h2 class="section-title">Monthly Important Actions Logged</h2>
  <div class="full-chart-card">
    <highcharts-chart
      [Highcharts]="Highcharts"
      [options]="importantOptions"
      style="width: 100%; height: 300px; display: block"
    >
    </highcharts-chart>
  </div>

  <!-- Monthly Critical and Important Actions Logged Versus Resolved -->
  <h2 class="section-title">
    Monthly Critical and Important Actions Logged Versus Resolved
  </h2>
  <div class="full-chart-card">
    <highcharts-chart
      [Highcharts]="Highcharts"
      [options]="logVsResolvedOptions"
      style="width: 100%; height: 300px; display: block"
    >
    </highcharts-chart>
  </div>

  <!-- Aging Analysis -->
  <h2 class="section-title aging-title">Aging Analysis</h2>
  <div class="aging-row">
    <div class="aging-table-card">
      <table>
        <thead>
          <tr>
            <th>Period</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of agingList">
            <td>{{ item.period }}</td>
            <td class="text-center">{{ item.action }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="aging-chart-card">
      <highcharts-chart
        [Highcharts]="Highcharts"
        [options]="agingPieOptions"
        style="width: 100%; height: 350px; display: block"
      >
      </highcharts-chart>
    </div>
  </div>
</div>

<!-- Scroll to Top Button -->
<button
  mat-mini-fab
  color="primary"
  class="scroll-top-btn"
  (click)="scrollToTop()"
>
  <mat-icon>keyboard_arrow_up</mat-icon>
</button>
