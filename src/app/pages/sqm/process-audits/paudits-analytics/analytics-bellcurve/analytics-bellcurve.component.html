<div class="filter-bar">




    
    <div class="filter-group right-align-group">

    
        <label class="filter-label mb-0">Commodity   :</label>
        <mat-select placeholder="Select Commodity" class="form-control" 
            style="width: auto; min-width: 120px;">

            <mat-option value="2023">Commodity 1</mat-option>
            <mat-option value="2024">Commodity 2</mat-option>
            <mat-option value="2025">Commodity 3</mat-option>
        </mat-select>
    </div>
    <div class="filter-group right-align-group">
        <label class="filter-label mb-0">Select Year :</label>
        <mat-select placeholder="Select Year" class="form-control" 
            style="width: auto; min-width: 120px;">

            <mat-option value="2023">2023</mat-option>
            <mat-option value="2024">2024</mat-option>
            <mat-option value="2025">2025</mat-option>
        </mat-select>
    </div>

    <button class="go-btn" mat-raised-button>
        <mat-icon class="mat-icon mt-1">search</mat-icon> Go
    </button>
</div>




<div class="dashboard-container">


    <div class="chart-wrapper">
        <canvasjs-chart [options]="chartOptions" [styles]="{'width': '100%', 'height': '450px', 'display': 'block'}">
        </canvasjs-chart>
    </div>
</div>
