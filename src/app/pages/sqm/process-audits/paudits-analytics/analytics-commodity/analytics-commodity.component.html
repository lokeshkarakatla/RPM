<h2 class="section-title " style="margin-left: 18px;">Distribution of Actions by Commodity</h2>
<div class="row">
  <div class="card table-container">
    <table>
      <thead>
        <tr>
          <th>Commodity Name</th>
          <th>Critical (%)</th>
          <th>Important (%)</th>
          <th>Others (%)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of commodityList">
          <td>{{ item.name }}</td>
          <td>{{ item.critical }}</td>
          <td>{{ item.important }}</td>
          <td>{{ item.others }}</td>
        </tr>
        <tr class="total-row">
          <td>Total</td>
          <td>75%</td>
          <td>55%</td>
          <td>65%</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="card chart-container">
    <highcharts-chart [Highcharts]="Highcharts" [options]="commodityPieOptions"
      style="width: 100%; height: 300px; display: block;"></highcharts-chart>
  </div>
</div>

<h3 class="section-title" style="margin-left: 18px;">Distribution of Actions by Status</h3>

<div class="row">
  <div class="card table-container">
    <table>
      <thead>
        <tr>
          <th>Rating</th>
          <th>Percentage (%)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of statusList">
          <td>{{ item.rating }}</td>
          <td>{{ item.percent }}</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="card chart-container">
    <highcharts-chart [Highcharts]="Highcharts" [options]="statusPieOptions"
      style="width: 100%; height: 300px; display: block;"></highcharts-chart>
  </div>
</div>
