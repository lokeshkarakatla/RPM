<div style="background-color: #2e3b84; color: #ffffff; padding: 16px; text-align: center; margin: -24px -24px 24px -24px;">
  <h2 style="margin: 0; font-size: 20px; font-weight: 500; font-family: Roboto, sans-serif;">Add Question</h2>
</div>

<mat-dialog-content style="padding: 20px; margin-bottom: 10px; overflow: hidden;">
  <div style="display: flex; flex-direction: column; gap: 16px;">

    <div style="display: flex; align-items: flex-start; gap: 20px;">
      
      <label style="width: 80px; font-weight: 600; color: #666; margin-top: 16px; font-family: Roboto, sans-serif;">
        Question: <span style="color: #ef4444;">*</span>
      </label>

      <mat-form-field appearance="outline" style="flex: 1; width: 100%;">
        <input 
          matInput 
          placeholder="Enter Question" 
          [(ngModel)]="questionText" 
          required>
      </mat-form-field>
      
    </div>

    <div style="display: flex; align-items: center; gap: 20px;">
      
      <label style="width: 80px; font-weight: 600; color: #666; font-family: Roboto, sans-serif;">
        Options:
      </label>

      <div style="display: flex; gap: 24px;">
        <mat-checkbox [(ngModel)]="isMandatory" color="primary">Mandatory</mat-checkbox>
        <mat-checkbox [(ngModel)]="isPriority" color="primary">Priority</mat-checkbox>
      </div>

    </div>

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" style="margin-bottom: -10px;">
  
  <button 
    mat-button 
    (click)="onCancel()" 
    style="background-color: #e5e5e5; color: #000; font-weight: 500; margin-right: 12px; padding: 0 16px;">
    <mat-icon style="font-size: 18px; height: 18px; width: 18px; margin-right: 4px; margin-top: 5px;">cancel</mat-icon> 
    Cancel
  </button>

  <button 
    mat-button 
    (click)="onSave()" 
    style="background-color: #e5e5e5; color: #000; font-weight: 500; padding: 0 16px;"
    [disabled]="!questionText.trim()">
    <mat-icon style="font-size: 18px; height: 18px; width: 18px; margin-right: 4px; margin-top: 5px;">save</mat-icon> 
    Save
  </button>

</mat-dialog-actions>
