<div style="width: 100%; box-sizing: border-box; padding: 15px; background-color: #f8f9fa;">

  <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px;">
    
    <button 
      (click)="onAddQuestion()"
      style="background-color: #0f8ed7; color: #ffffff; border: none; padding: 8px 16px; border-radius: 4px; display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 500; font-family: Roboto, sans-serif; font-size: 14px;">
      <mat-icon style="font-size: 18px; width: 18px; height: 18px; margin-top: 7px;">add</mat-icon>
      Add Question
    </button>

    <button (click)="goBack()"
       
      style="background-color: #ffffff; color: #333333; border: 1px solid #d1d5db; padding: 8px 16px; border-radius: 4px; display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 500; font-family: Roboto, sans-serif; font-size: 14px;">
      <mat-icon style="font-size: 18px; width: 18px; height: 18px; margin-top: 7px;">arrow_back</mat-icon>
      Back
    </button>

  </div>

  <div class="table-responsive bg-white shadow-sm" style="width: 100%; border-radius: 4px; overflow-x: auto; border: 1px solid #e5e7eb;">

    <table style="width: 100%; min-width: 900px; border-collapse: collapse; font-family: Roboto, 'Helvetica Neue', sans-serif;">
      
      <thead style="background-color: #212529; color: #ffffff;">
        <tr>
          <th style="padding: 12px 16px; text-align: left; border-right: 1px solid #495057; font-weight: 500; font-size: 14px;">Question</th>
          
          <th style="padding: 12px 16px; text-align: center; border-right: 1px solid #495057; font-weight: 500; width: 150px; font-size: 14px;">Mandatory</th>
          <th style="padding: 12px 16px; text-align: center; border-right: 1px solid #495057; font-weight: 500; width: 150px; font-size: 14px;">Priority</th>
          <th style="padding: 12px 16px; text-align: center; font-weight: 500; width: 120px; font-size: 14px;">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of tableData" style="border-bottom: 1px solid #e5e7eb; background-color: #ffffff; transition: background-color 0.2s;">
          
          <td style="padding: 12px 16px; border-right: 1px solid #e5e7eb; font-size: 14px; color: #374151;">
            {{ item.question }}
          </td>

         

          <td style="padding: 12px 16px; text-align: center; border-right: 1px solid #e5e7eb; font-size: 14px; color: #374151;">
            {{ item.mandatory }}
          </td>

          <td style="padding: 12px 16px; text-align: center; border-right: 1px solid #e5e7eb; font-size: 14px; color: #374151;">
            {{ item.priority }}
          </td>

          <td style="padding: 10px 16px; text-align: center;">
            
            <button 
              mat-icon-button 
              (click)="onEdit(item)" 
              style="background: none; border: none; cursor: pointer; color: #3b82f6; padding: 0 4px; margin-right: 4px;">
              <mat-icon style="font-size: 18px; height: 18px; width: 18px;">edit</mat-icon>
            </button>

            <button 
              mat-icon-button 
              (click)="onDelete(item)" 
              style="background: none; border: none; cursor: pointer; color: #ef4444; padding: 0 4px;">
              <mat-icon style="font-size: 18px; height: 18px; width: 18px;">delete</mat-icon>
            </button>

          </td>

        </tr>
      </tbody>
    </table>

  </div>

</div>
