<div class="NewHeader">
    <h3 style="padding-top:10px;">{{ isEdit ? 'Edit Criteria' : 'Add Criteria' }}</h3>
</div>


<!-- column 1 -->
<div class="col-sm-6 p-4"  >

<div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="margin-top: 0px; padding-left: 20px;">
            <form>
                <div>
                    
                    <!-- Subject -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5 required" style="margin-top:5px;">Subject :</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="subject" [(ngModel)]="subject" maxlength="150" style="height:35px;" class="form-control back" placeholder="Enter Subject">
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="row" style="margin-top: 10px; margin-bottom: 12px;">
                        <div class="col-lg-4 col-md-4 col-sm-4 col-xs-4">
                            <label class="control-label mt-1">Description:</label>
                        </div>
                        <div class="col-sm-8">
                            <textarea class="form-control" name="description" [(ngModel)]="description" rows="3" placeholder="Enter Description" style="resize: vertical;"></textarea>
                        </div>
                    </div>

                    <!-- Priority -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5 required" style="margin-top:5px;">Priority  :</label>
                        </div>
                        <div class="col-sm-8">
                            <mat-select placeholder="Select Priority" name="priority" [(ngModel)]="priority" class="form-control">
                                <mat-option value="High"> High</mat-option>
                                <mat-option value="Medium">Medium</mat-option>
                                <mat-option value="Low"> Low </mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- Mandatory -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5 required" style="margin-top:5px;">
                                Mandatory:
                            </label>
                        </div>
                        <div class="col-sm-8 d-flex align-items-center">
                            <mat-checkbox class="back" name="mandatory" [(ngModel)]="mandatory"> </mat-checkbox>
                        </div>
                    </div>

                </div>
            </form>

           
            
        </div>
    </div>















</div>




<!-- column 2 -->
 <h4 class="text-center " style="margin-top: 30px;">Upload Guidelines:</h4>
<div class="col-sm-6"  >
      
          <div class="form-row" >
     

    <div class="upload-box">
      <p>Drag and drop files here</p>

      <button type="button" class="browse-btn" (click)="fileInput.click()">
        Browse Files
      </button>

      <input type="file" #fileInput hidden (change)="onFileSelected($event)">
    </div>
  </div>

   <!-- Actions -->

            <mat-dialog-actions align="end" style="margin-top: 35px;">
                <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 0px;">
                    <mat-icon>cancel</mat-icon> Close
                </button>
                <button mat-raised-button type="button" class="save" color="primary" style="margin-right: 0px;" (click)="save()">
                    <mat-icon>save</mat-icon> Save
                </button>
            </mat-dialog-actions>
</div>
