<div class="criteria-wrapper">
  <div class="col-lg-12 col-sm-8">

    <div style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
      <button mat-raised-button color="primary" class="primary-btn" (click)="addCriteria()">
        <mat-icon>person_add</mat-icon> Add Criteria
      </button>
    </div>

    <div class="table-responsive">
      <table matSort id="example2" class="table table-bordered table-hover">
        <thead class="tbl-head">
          <tr>
            <th class="theadcolor text-center">Move</th>
            <th class="theadcolor text-center">Actions</th>
            <th class="theadcolor text-center">Status</th>
            <th class="theadcolor text-center">Subject</th>
            <th class="theadcolor text-center">Description</th>
            <th class="theadcolor text-center">Priority</th>
            <!-- <th class="theadcolor text-center" style="width: 100px">Yes / No</th> -->
            <th class="theadcolor text-center">Mandatory</th>
          </tr>
        </thead>

        <tbody dragula="TESTING_ROWS" [dragulaModel]="designStageQuestions"
          (dragulaModelChange)="designStageQuestions = $event">
          <tr *ngFor="let item of designStageQuestions">

            <!-- 1. Move -->
             <td class="text-center">
                    <mat-icon style="color: #9e9e9e; cursor: grab;">drag_indicator</mat-icon>
                </td>

            <!-- 2. Actions -->
            <td class="text-center editDel">
              <a style="cursor: pointer; margin-right: 0px; margin-left: -5px;" matTooltip="Edit"
                (click)="addmodule(item)">
                <i class="fa fa-edit" style="color: cornflowerblue"></i>
              </a>
              <a [ngClass]="{ 'disable-custom': !canDelete || item.TotalUsed }">
                <i style="cursor: pointer" matTooltip="Delete" class="fa fa-trash red"
                  (click)="deleteConfirmation(item)"></i>
              </a>
            </td>

            <!-- 3. Status -->
            <td class="text-center">
              <a [ngStyle]="{ color: item.status ? 'blue' : 'red', cursor: canUpdate ? 'pointer' : 'default' }"
                [ngClass]="{ 'disable-custom': !canUpdate }">
                <span (click)="canUpdate && Confirmation(item)">
                  {{ item.status ? 'Active' : 'Inactive' }}
                </span>
              </a>
            </td>

            <!-- 4. Subject -->
            <td>{{ item.question }}</td>

            <!-- 5. Description -->
            <td>{{ item.description }}</td>

            <!-- 6. Priority -->
            <td class="text-center">
              <select [(ngModel)]="item.priority"
                style="width: 100%; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; background-color: white; appearance: auto; cursor: pointer;">
                <option value="" disabled hidden selected> Priority</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </td>

            <!-- 7. Yes / No -->
              <!-- <td class="text-center">
              <mat-radio-group aria-label="Select an option" [(ngModel)]="item.answer">
                <mat-radio-button value="yes" style="margin-right: 10px"></mat-radio-button>
                <mat-radio-button value="no"></mat-radio-button>
              </mat-radio-group>
            </td> -->

            <!-- 8. Mandatory -->
            <td class="text-center">
              <mat-checkbox [(ngModel)]="item.mandatory"></mat-checkbox>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
