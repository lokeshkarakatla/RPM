    <div class="col-lg-10 col-sm-8" style="padding-right: 0;">
      
      <div style="height: 40px; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 12px; gap: 10px;">
        <button mat-raised-button color="primary" class="primary-btn" (click)="addCriteria()">
          <mat-icon>add</mat-icon> Add Criteria
        </button>
        <button mat-raised-button style="background-color: #808080; color: white;" (click)="goBack()">
          <mat-icon>arrow_back</mat-icon> Back
        </button>
      </div>

      <div class="table-responsive bg-white shadow-sm">
        <table matSort id="example2" class="table table-bordered table-hover custom-grid-table" style="margin-bottom: 0;">
          <thead class="tbl-head">
            <tr>
              <th class="theadcolor text-center" style="width: 60px;">Move</th>
              <th class="theadcolor text-center" style="width: 90px;">Actions</th>
              <th class="theadcolor text-center" style="width: 80px;">Status</th>
              <th class="theadcolor text-left" style="width: 25%;">Subject</th>
              <th class="theadcolor text-left" style="width: 30%;">Description</th>
               <th class="theadcolor text-center" style="width: 10%;">Guidelines</th>
              <th class="theadcolor text-center" style="width: 120px;">Priority</th>
              <th class="theadcolor text-center" style="width: 100px;">Mandatory</th>
            </tr>
          </thead>

          <tbody dragula="IMPLEMENTATION_ROWS" [dragulaModel]="selectedModule.criteria"
            (dragulaModelChange)="selectedModule.criteria = $event">
            
            <tr *ngFor="let item of selectedModule.criteria">
              <td class="text-center align-middle">
                <mat-icon style="color: #9e9e9e; cursor: grab;">drag_indicator</mat-icon>
              </td>

              <td class="text-center editDel align-middle"><div style="display: flex; align-items: center; justify-content: center; gap: 10px; white-space: nowrap;">
                <a style="cursor: pointer;" matTooltip="Edit" (click)="addmodule(item)">
                  <i class="fa fa-edit" style="color: cornflowerblue"></i>
                </a>
                <a [ngClass]="{ 'disable-custom': !canDelete || item.TotalUsed }">
                  <i style="cursor: pointer" matTooltip="Delete" class="fa fa-trash red" (click)="deleteConfirmation(item)"></i>
                </a>
                </div>
              </td>

              <td class="text-center align-middle">
                <a [ngStyle]="{ color: item.status ? 'blue' : 'red', cursor: canUpdate ? 'pointer' : 'default' }"
                  [ngClass]="{ 'disable-custom': !canUpdate }">
                  <span (click)="canUpdate && Confirmation(item)">
                    {{ item.status ? 'Active' : 'Inactive' }}
                  </span>
                </a>
              </td>

              <td class="align-middle">{{ item.question }}</td>

              <td class="align-middle">{{ item.description }}</td>
              <td class="text-center align-middle">
  <a style="cursor: pointer;" matTooltip="Download Guidelines" (click)="uploadGuidelines()">
    <mat-icon style="color: cornflowerblue;">download</mat-icon>
  </a>
</td>

              <td class="text-center align-middle">
                <select [(ngModel)]="item.priority"
                  style="width: 100%; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; background-color: white; appearance: auto; cursor: pointer;">
                  <option value="" disabled hidden selected> Priority</option>
                  <option value="High">High</option>
                  <option value="Medium">Medium</option>
                  <option value="Low">Low</option>
                </select>
              </td>

              <td class="text-center align-middle">
                <mat-checkbox [(ngModel)]="item.mandatory"></mat-checkbox>
              </td>
            </tr>
            
            <tr *ngIf="selectedModule.criteria.length === 0">
              <td colspan="7" class="text-center py-4 text-muted">
                No criteria found for this module.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
