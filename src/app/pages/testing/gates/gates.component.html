    <!-- Table -->
    <div class="container-fluid col-lg-10 " style="padding-right: 1px; padding-left: 0px">
      <div fxLayout="row wrap" #resizedDiv>
        <div class="flex-p w-100 sizeAlign">
          <div class="row">
            <div class="col-sm-12">
              <div id="grid-table-container" class="table-responsive">
                <table matSort id="example2" class="table table-bordered table-hover">
                  <thead class="tbl-head">
                    <tr>
                      <th class="text-center">Move</th>
                      <th class="text-center" style="width: 112px !important">Actions</th>
                      <th class="text-center">Status</th>
                      <th class="text-left">Gate Name</th>
                      <th class="text-left">Description</th>
                      <th class="text-center" style="width: 160px">Acceptance Criteria</th>
                    </tr>
                  </thead>

                  <tbody dragula="MONITORSTEPS" [dragulaModel]="stages" (dragulaModelChange)="stages = $event">
                    <tr *ngFor="let item of stages">

                      <!-- 6. Move: drag handle -->
                      <td class="text-center">
                        <mat-icon style="color: #9e9e9e; cursor: grab;">drag_indicator</mat-icon>
                      </td>


                      <!-- 1. Actions: edit + delete -->
                      <td class="text-center editDel">
                        <a style="cursor: pointer; margin-right: 0px; margin-left: -5px;" matTooltip="Edit"
                          (click)="addmodule(item)">
                          <i class="fa fa-edit" style="color: cornflowerblue"></i>
                        </a>
                        <a [ngClass]="{ 'disable-custom': !canDelete || item.TotalUsed }">
                          <i style="cursor: pointer" matTooltip="Delete" class="fa fa-trash red"
                            (click)="deleteConfirmation(item)"></i>
                        </a>
                      </td>

                      <!-- 2. Status -->
                      <td class="text-center">
                        <a [ngStyle]="{ color: item.status ? 'blue' : 'red', cursor: canUpdate ? 'pointer' : 'default' }"
                          [ngClass]="{ 'disable-custom': !canUpdate }">
                          <span (click)="canUpdate && Confirmation(item)">
                            {{ item.status ? 'Active' : 'Inactive' }}
                          </span>
                        </a>
                      </td>

                      <!-- 3. Gates Name -->
                      <td>{{ item.name }}</td>

                      <!-- 4. Description -->
                      <td>{{ item.description }}</td>

                      <!-- 5. Acceptance Criteria -->
                      <td class="text-center primary tooltip-cell" style="color: blue; cursor: pointer;"
                        (click)="navigateTo(item.route)">
                        {{ item.count }}
                      </td>


                    </tr>
                  </tbody>
                </table>

                <mat-paginator [length]="totalSize" [pageIndex]="currentPage" [pageSize]="pageSize"
                  [pageSizeOptions]="[5, 10, 25, 50, 100]" showFirstLastButtons>
                </mat-paginator>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </ng-container>
  <!-- END *ngIf="!isChildRouteActive" — table is completely hidden when child is open -->

  <!-- ===================================================
       CHILD ROUTE VIEW — shown only when a gate is opened
       router-outlet is OUTSIDE the table ng-container so
       the table never renders alongside the child.
       =================================================== -->
  <ng-container *ngIf="isChildRouteActive">

    <!-- ✅ Back button pinned to the right -->
    <div class="back-btn-row">
      <button mat-raised-button style="background-color: #808080; color: white; margin-top: -75px;" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon> Back
      </button>
    </div>

    <router-outlet></router-outlet>

  </ng-container>

</div>
