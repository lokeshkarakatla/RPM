<div class="NewHeader">
    <h1 mat-dialog-title style="color:white;">
        {{ isEditMode ? 'Update Site' : 'Add Site' }}
    </h1>
</div>

<div mat-dialog-content>
    <div class="col-sm-12" style="margin-bottom: 10px;">
        <form [formGroup]="myGroup">
            <div class="row" style="margin-bottom: 12px;">
                <div class="col-sm-3">
                    <label class="add-member-label control-label" style="margin-top:5px;">Site Name :</label>
                </div>
                <div class="col-sm-9">
                    <input class="form-control name back" maxlength="100" placeholder="Enter Site Name"
                        formControlName="siteName" type="text">
                    <div *ngIf="isSubmitting && f['siteName'].errors" class="text-danger" style="font-size: 11px;">
                        <span *ngIf="f['siteName'].errors['required']">Site Name is required.</span>
                    </div>
                </div>
            </div>
            <div class="row" style="margin-bottom: 12px;">
                <div class="col-sm-3">
                    <label class="add-member-label control-label" style="margin-top:5px;">Site Code :</label>
                </div>
                <div class="col-sm-9">
                    <input class="form-control name back" maxlength="20" placeholder="Enter Site Code"
                        formControlName="siteCode" type="text">
                    <div *ngIf="isSubmitting && f['siteCode'].errors" class="text-danger" style="font-size: 11px;">
                        <span *ngIf="f['siteCode'].errors['required']">Site Code is required.</span>
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 10px;">
                <div class="pull-right">
                    <button mat-raised-button class="me-3" (click)="close()"
                        style="background-color: lightgray; color: red">
                        <mat-icon>cancel</mat-icon> Close
                    </button>
                    <button mat-raised-button type="submit" class="save" (click)="save()"
                        style="margin-right: 5px;" color="primary">
                        <mat-icon>save</mat-icon> Save
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
