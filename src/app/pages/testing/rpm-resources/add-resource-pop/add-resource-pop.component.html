<div class="modal-dialog-container">
    <!-- Header -->
    <div class="NewHeader">
        <h4 style="margin: 0; font-weight: 500; font-size: 18px;">Add Resource</h4>
    </div>

    <!-- Content -->
    <div class="dialog-content">
        <div class="form-container">
            
            <!-- Resource Code -->
            <div class="row align-items-center mb-3">
                <div class="col-4 label-col text-right">
                    <label class="control-label font-label">
                        Resource Code <span style="color: red;">*</span> :
                    </label>
                </div>
                <div class="col-8">
                    <input type="text" class="form-control back" placeholder="Enter Resource Code" [(ngModel)]="resourceCode" name="resourceCode" required />
                </div>
            </div>

            <!-- Resource Name -->
            <div class="row align-items-center">
                <div class="col-4 label-col text-right">
                    <label class="control-label font-label">
                        Resource Name <span style="color: red;">*</span> :
                    </label>
                </div>
                <div class="col-8">
                    <input type="text" class="form-control back" placeholder="Enter Resource Name" [(ngModel)]="resourceName" name="resourceName" required (keyup.enter)="save()" />
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div class="footer-actions">
        <button mat-raised-button type="button" class="close-btn" (click)="close()">
            <mat-icon>cancel</mat-icon>
            Close
        </button>
        <button mat-raised-button color="primary" type="submit" class="save-btn" (click)="save()" [disabled]="!resourceCode.trim() || !resourceName.trim()">
            <mat-icon>save</mat-icon>
            Save
        </button>
    </div>
</div>
