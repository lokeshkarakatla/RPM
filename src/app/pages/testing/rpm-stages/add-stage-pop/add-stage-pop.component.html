<div class="NewHeader">
    <h3 style="padding-top:10px; color: white; text-align: center;">{{ isEdit ? 'Edit Stage' : 'Add Stage' }}</h3>
</div>

<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="margin-top: 20px; padding-left: 20px; padding-right: 20px;">
            <form #stageForm="ngForm">
                <div>
                    <!-- Stage Name -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5 required" style="margin-top:5px;">Stage Name:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="stageName" [(ngModel)]="stageName" maxlength="150" style="height:35px;" class="form-control" placeholder="Enter Stage Name" required>
                        </div>
                    </div>

                    <!-- Select Gate -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5 required" style="margin-top:5px;">Select Gate:</label>
                        </div>
                        <div class="col-sm-8">
                            <mat-select name="gateCode" [(ngModel)]="gateCode" class="form-control" placeholder="Select Gate" required>
                                <mat-option value="GT001">GT001 (Feasibility)</mat-option>
                                <mat-option value="GT002">GT002 (Design)</mat-option>
                                <mat-option value="GT003">GT003 (Prototyping)</mat-option>
                                <mat-option value="GT004">GT004 (Testing)</mat-option>
                                <mat-option value="GT005">GT005 (Launch)</mat-option>
                                <mat-option value="GT006">GT006 (Implementation)</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- Plan Effort -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5 required" style="margin-top:5px;">Plan Effort (hrs):</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="number" name="planEffort" [(ngModel)]="planEffort" min="0" style="height:35px;" class="form-control" placeholder="Enter Plan Effort (hrs)" required>
                        </div>
                    </div>

                    <!-- Plan Duration -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5 required" style="margin-top:5px;">Plan Duration (days):</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="number" name="planDuration" [(ngModel)]="planDuration" min="0" style="height:35px;" class="form-control" placeholder="Enter Plan Duration (days)" required>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="row" style="margin-top: 10px; margin-bottom: 12px;">
                        <div class="col-lg-4 col-md-4 col-sm-4 col-xs-4">
                            <label class="control-label mt-1">Description:</label>
                        </div>
                        <div class="col-sm-8">
                            <textarea name="stageDescription" [(ngModel)]="stageDescription" class="form-control" rows="3" placeholder="Enter Description" style="resize: vertical;"></textarea>
                        </div>
                    </div>
                </div>
            </form>

            <!-- Actions -->
            <mat-dialog-actions align="end" style="margin-top: 15px; padding-bottom: 15px;">
                <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 5px;">
                    <mat-icon>cancel</mat-icon> Close
                </button>
                <button mat-raised-button type="button" class="save" color="primary" (click)="save()" [disabled]="!stageForm.valid">
                    <mat-icon>save</mat-icon> Save
                </button>
            </mat-dialog-actions>
        </div>
    </div>
</div>
