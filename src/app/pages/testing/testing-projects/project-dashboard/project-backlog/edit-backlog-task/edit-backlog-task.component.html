<div class="NewHeader">
    <h3 style="padding-top:10px; color: white; text-align: center;">{{ isEditMode ? 'Edit Task' : 'Add Task' }}</h3>
</div>

<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="margin-top: 20px; padding-left: 20px; padding-right: 20px;">
            <form #taskForm="ngForm">
                <div>
                    <!-- Task Name -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Task Name:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="task" [(ngModel)]="task" style="height:35px;" class="form-control back" placeholder="Enter Task Name" required>
                        </div>
                    </div>

                    <!-- Task Code -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Task Code:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="taskCode" [(ngModel)]="taskCode" style="height:35px;" class="form-control back" placeholder="Enter Task Code" required>
                        </div>
                    </div>

                    <!-- Job Code -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Job Code:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="jobCode" [(ngModel)]="jobCode" style="height:35px;" class="form-control back" placeholder="Enter Job Code" required>
                        </div>
                    </div>

                    <!-- Plan Start -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Plan Start:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="date" name="planStart" [(ngModel)]="planStart" style="height:35px;" class="form-control back" required>
                        </div>
                    </div>

                    <!-- Plan Finish -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Plan Finish:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="date" name="planFinish" [(ngModel)]="planFinish" style="height:35px;" class="form-control back" required>
                        </div>
                    </div>

                    <!-- Effort -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Effort (hrs):</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="number" name="effort" [(ngModel)]="effort" style="height:35px;" class="form-control back" required>
                        </div>
                    </div>

                    <!-- Duration -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Duration (days):</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="number" name="duration" [(ngModel)]="duration" style="height:35px;" class="form-control back" required>
                        </div>
                    </div>

                    <!-- Stage -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Stage:</label>
                        </div>
                        <div class="col-sm-8">
                            <mat-select name="stage" [(ngModel)]="stage" class="form-control" placeholder="Select Stage" required>
                                <mat-option *ngFor="let st of stages" [value]="st">{{ st }}</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- Assigned -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Assigned:</label>
                        </div>
                        <div class="col-sm-8">
                            <mat-select name="assigned" [(ngModel)]="assigned" class="form-control" placeholder="Select Member">
                                <mat-option value="">Unassigned</mat-option>
                                <mat-option *ngFor="let m of team" [value]="m">{{ m }}</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Description:</label>
                        </div>
                        <div class="col-sm-8">
                            <textarea name="description" [(ngModel)]="description" class="form-control back" rows="3" placeholder="Enter Description" style="resize: vertical;"></textarea>
                        </div>
                    </div>

                </div>
            </form>

            <mat-dialog-actions align="end" style="margin-top: 15px; padding-bottom: 15px;">
                <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 5px;">
                    <mat-icon>cancel</mat-icon> Close
                </button>
                <button mat-raised-button type="button" class="save" color="primary" (click)="save()" [disabled]="!taskForm.valid">
                    <mat-icon>save</mat-icon> Save
                </button>
            </mat-dialog-actions>
            
        </div>
    </div>
</div>
