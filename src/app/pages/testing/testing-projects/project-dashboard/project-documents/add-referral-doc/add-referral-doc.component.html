<div class="NewHeader">
  <h3 *ngIf="!isEditMode">Add Referral Document</h3>
  <h3 *ngIf="isEditMode">Edit Referral Document</h3>
</div>

<div mat-dialog-content class="custom-dialog-content pt-2">
  <form class="layout-container">
    
    <div class="left-pane">
      
   <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5  " style="margin-top:5px;">Document Type:</label>
                        </div>
                        <div class="col-sm-8" style="width:260px; margin-left: 5px;">
                             <mat-select class="form-control" placeholder="Select Document Type">
                  <mat-option value="High">Intake</mat-option>
                  <mat-option value="Medium"> Invoice</mat-option>
                  <mat-option value="Low">AOB</mat-option>
                  <mat-option value="High">Medical Records</mat-option>
                  <mat-option value="Medium"> LOP</mat-option>
                  <mat-option value="Low">Payments</mat-option>
                   <mat-option value="Medium"> Imaging</mat-option>
                  <mat-option value="Low">Clinic Notes</mat-option>
                </mat-select>
                        </div>
                    </div>

      <div class="form-group row-align">
        <label class="control-label">Document Title :</label>
        <div class="input-container">
          <input type="text" class="form-control" placeholder="Enter Document Title" />
        </div>
      </div>

      <div class="form-group row-align">
        <label class="control-label">Remarks :</label>
        <div class="input-container">
          <textarea class="form-control resizable-textarea" rows="3" placeholder="Enter Remarks"></textarea>
        </div>
      </div>
      
    </div>

    <div class="right-pane">
      <div class="upload-container">
        <input type="file" #fileInput hidden multiple />
        <div class="drag-drop-zone" (click)="fileInput.click()">
          <div class="upload-text">Drag and drop files here</div>
          <button
            mat-raised-button
            type="button"
            class="browse-btn"
            (click)="$event.stopPropagation(); fileInput.click()"
          >
            Browse Files
          </button>
        </div>
      </div>
    </div>
    
  </form>
</div>

<mat-dialog-actions class="dialog-actions-right">
  <button
    mat-flat-button
    class="close-btn"
    (click)="close()"
  >
    <mat-icon>cancel</mat-icon> Close
  </button>
  <button
    mat-flat-button
    color="primary"
    class="next-btn"
    (click)="changeAddStep(2)"
  >
    Save <mat-icon>save</mat-icon>
  </button>
</mat-dialog-actions>
