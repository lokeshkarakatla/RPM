<div class="NewHeader">
  <h3 style="padding-top:10px; margin: 0; color: white; text-align: center;">
    {{ isEditMode ? 'Edit Document' : 'Add Document' }}
  </h3>
</div>

<div mat-dialog-content class="custom-dialog-content pt-2" style="padding: 20px 25px;">
  <form #docForm="ngForm" class="layout-container" style="display: flex; flex-direction: column; gap: 15px;">

    <!-- Document Type -->
    <div class="row align-items-center" style="display: flex; align-items: center; width: 100%;">
      <div class="col-sm-4 text-end">
        <label class="add-member-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Document Type:<span
            style="color: red;">*</span></label>
      </div>
      <div class="col-sm-8">
        <mat-select name="documentType" [(ngModel)]="documentType" class="form-control"
          placeholder="Select Document Type" required style="width: 100%; height: 35px; line-height: 24px;">
          <mat-option *ngFor="let type of documentTypes" [value]="type">{{ type }}</mat-option>
        </mat-select>
      </div>
    </div>

    <!-- Document Title -->
    <div class="row align-items-center" style="display: flex; align-items: center; width: 100%;">
      <div class="col-sm-4 text-end">
        <label class="control-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Document Title:<span
            style="color: red;">*</span></label>
      </div>
      <div class="col-sm-8">
        <input type="text" name="documentTitle" [(ngModel)]="documentTitle" class="form-control"
          placeholder="Enter Document Title" required style="width: 100%; height: 35px;" />
      </div>
    </div>

    <!-- Category -->
    <div class="row align-items-center" style="display: flex; align-items: center; width: 100%;">
      <div class="col-sm-4 text-end">
        <label class="control-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Category:<span
            style="color: red;">*</span></label>
      </div>
      <div class="col-sm-8">
        <input type="text" name="category" [(ngModel)]="category" class="form-control" placeholder="Enter Category"
          required style="width: 100%; height: 35px;" />
      </div>
    </div>

    <!-- Context -->
    <div class="row align-items-center" style="display: flex; align-items: center; width: 100%;">
      <div class="col-sm-4 text-end">
        <label class="control-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Context:</label>
      </div>
      <div class="col-sm-8">
        <input type="text" name="context" [(ngModel)]="context" class="form-control" placeholder="Enter Context"
          style="width: 100%; height: 35px;" />
      </div>
    </div>

    <!-- Remarks -->
    <div class="row" style="display: flex; width: 100%;">
      <div class="col-sm-4 text-end" style="margin-top: 5px;">
        <label class="control-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Remarks:</label>
      </div>
      <div class="col-sm-8">
        <textarea name="remarks" [(ngModel)]="remarks" class="form-control resizable-textarea" rows="3"
          placeholder="Enter Remarks" style="width: 100%;"></textarea>
      </div>
    </div>

    <!-- Upload File (Styled like img2) -->
    <div class="row align-items-center" style="display: flex; align-items: center; width: 100%;">
      <div class="col-sm-4 text-end">
        <label class="control-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Upload File :<span
            style="color: red;">*</span></label>
      </div>
      <div class="col-sm-8">
        <input type="file" class="form-control"
          style="background-color: #fefec4 !important; width: 100%; height: 30px;" />
      </div>
    </div>

  </form>
</div>

<mat-dialog-actions class="dialog-actions-right"
  style="padding: 15px 25px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #cbd5e1; margin-top: 15px;">
  <button mat-raised-button class="close-btn" (click)="close()"
    style="background-color: lightgray; color: red; height: 38px;">
    <mat-icon>cancel</mat-icon> Close
  </button>
  <button mat-raised-button color="primary" class="save-btn" (click)="save()" [disabled]="!docForm.valid"
    style="height: 38px;">
    Save <mat-icon>save</mat-icon>
  </button>
</mat-dialog-actions>
