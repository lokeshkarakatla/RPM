<div class="NewHeader">
    <h1 mat-dialog-title style="color: white; margin: 0;">
        {{ isEditMode ? 'Edit Expense' : 'Add Expense' }}
    </h1>
</div>

<form #expenseForm="ngForm" class="dialog-form" autocomplete="off">

    <div mat-dialog-content class="dialog-content">

        <div class="expense-grid">

            <!-- ========================= LEFT COLUMN ========================= -->

            <div class="column">

                <!-- Submitted By -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Submitted By <span style="color: red;">*</span> :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="text" class="form-control back" name="submittedBy" [(ngModel)]="submittedBy"
                            placeholder="Enter Submitted By" required style="height: 35px;" />
                    </div>
                </div>

                <!-- Subject -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Subject <span style="color: red;">*</span> :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="text" class="form-control back" name="subject" [(ngModel)]="subject"
                            placeholder="Enter Subject" required style="height: 35px;" />
                    </div>
                </div>

                <!-- Amount -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Amount <span style="color: red;">*</span> :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="text" class="form-control back" name="amount" [(ngModel)]="amount"
                            placeholder="Enter Amount" required style="height: 35px;" />
                    </div>
                </div>

                <!-- Submitted Date -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Submitted Date :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="date" class="form-control back" name="submittedDate" [(ngModel)]="submittedDate" style="height: 35px;" />
                    </div>
                </div>

                <!-- Approved Date -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Approved Date :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="date" class="form-control back" name="approvedDate" [(ngModel)]="approvedDate" style="height: 35px;" />
                    </div>
                </div>

                <!-- Upload File -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Upload File <span style="color: red;">*</span> :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="file" class="form-control back" (change)="onPdfSelected($event)" accept=".pdf" style="height: auto; padding: 4px;" />
                        <div *ngIf="pdfFileName" class="file-info-text" style="font-size: 11px; color: #555; margin-top: 3px; display: flex; align-items: center; gap: 4px;">
                            <span>Existing: {{ pdfFileName }}</span>
                            <a style="cursor: pointer; color: red;" (click)="removePdf()" matTooltip="Remove File">
                                <i class="fa fa-times"></i>
                            </a>
                        </div>
                    </div>
                </div>

            </div>

            <!-- ========================= RIGHT COLUMN ========================= -->

            <div class="column column-right">

                <!-- Stage -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Stage :</label>
                    </div>
                    <div class="col-8 input-col">
                        <select class="form-control back" name="stage" [(ngModel)]="stage" style="height: 35px;">
                            <option *ngFor="let st of stages" [value]="st">
                                {{st}}
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Module -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Module :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="text" class="form-control back" name="module" [(ngModel)]="module"
                            placeholder="Enter Module" style="height: 35px;" />
                    </div>
                </div>

                <!-- Task -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Task :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="text" class="form-control back" name="task" [(ngModel)]="task"
                            placeholder="Enter Task" style="height: 35px;" />
                    </div>
                </div>

                <!-- Approved By -->
                <div class="row form-row">
                    <div class="col-4 label-col">
                        <label class="control-label">Approved By :</label>
                    </div>
                    <div class="col-8 input-col">
                        <input type="text" class="form-control back" name="approvedBy" [(ngModel)]="approvedBy"
                            placeholder="Enter Approved By" style="height: 35px;" />
                    </div>
                </div>

                <!-- Description -->
                <div class="row form-row desc-row">
                    <div class="col-4 label-col" style="padding-top: 5px;">
                        <label class="control-label">Description :</label>
                    </div>
                    <div class="col-8 input-col">
                        <textarea class="form-control back desc-textarea" name="description" [(ngModel)]="description"
                            placeholder="Enter Description"></textarea>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- ===================== FOOTER ===================== -->

    <div mat-dialog-actions align="end" class="footer-actions">
        <button mat-raised-button type="button" class="close-btn" (click)="close()">
            <mat-icon>cancel</mat-icon>
            Close
        </button>
        <button mat-raised-button color="primary" type="submit" class="save-btn" (click)="save()"
            [disabled]="!expenseForm.valid">
            <mat-icon>save</mat-icon>
            Save
        </button>
    </div>

</form>
