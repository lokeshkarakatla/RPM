<div class="NewHeader">
    <h3 style="padding-top:10px; color: white; text-align: center;">{{ isEditMode ? 'Edit Expense' : 'Add Expense' }}</h3>
</div>

<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="margin-top: 20px; padding-left: 20px; padding-right: 20px;">
            <form #expenseForm="ngForm">
                <div>
                    <!-- Employee Name -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Name:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="name" [(ngModel)]="name" style="height:35px;" class="form-control back" placeholder="Enter Employee Name" required>
                        </div>
                    </div>

                    <!-- Subject -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Subject:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="subject" [(ngModel)]="subject" style="height:35px;" class="form-control back" placeholder="Enter Subject" required>
                        </div>
                    </div>

                    <!-- Amount -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Amount:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="amount" [(ngModel)]="amount" style="height:35px;" class="form-control back" placeholder="Enter Amount" required>
                        </div>
                    </div>

                    <!-- Approved By -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Approved By:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="approvedBy" [(ngModel)]="approvedBy" style="height:35px;" class="form-control back" placeholder="Enter Approver Name">
                        </div>
                    </div>

                    <!-- Module -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Module:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="module" [(ngModel)]="module" style="height:35px;" class="form-control back" placeholder="Enter Module">
                        </div>
                    </div>

                    <!-- Task -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Task:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="task" [(ngModel)]="task" style="height:35px;" class="form-control back" placeholder="Enter Task">
                        </div>
                    </div>

                    <!-- Stage -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Stage:</label>
                        </div>
                        <div class="col-sm-8">
                            <mat-select name="stage" [(ngModel)]="stage" class="form-control" placeholder="Select Stage" required>
                                <mat-option *ngFor="let st of stages" [value]="st">{{ st }}</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Description:</label>
                        </div>
                        <div class="col-sm-8">
                            <textarea name="description" [(ngModel)]="description" class="form-control back" rows="3" placeholder="Enter Description" style="resize: vertical;"></textarea>
                        </div>
                    </div>

                </div>
            </form>

            <mat-dialog-actions align="end" style="margin-top: 15px; padding-bottom: 15px;">
                <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 5px;">
                    <mat-icon>cancel</mat-icon> Close
                </button>
                <button mat-raised-button type="button" class="save" color="primary" (click)="save()" [disabled]="!expenseForm.valid">
                    <mat-icon>save</mat-icon> Save
                </button>
            </mat-dialog-actions>
            
        </div>
    </div>
</div>
