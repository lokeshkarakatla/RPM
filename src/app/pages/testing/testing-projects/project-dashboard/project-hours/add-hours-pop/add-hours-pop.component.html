<div class="NewHeader">
    <h3 style="padding-top:10px; color: white; text-align: center;">{{ isEditMode ? 'Edit Hours Entry' : 'Add Hours Entry' }}</h3>
</div>

<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="margin-top: 20px; padding-left: 20px; padding-right: 20px;">
            <form #hoursForm="ngForm">
                <div>
                    <!-- Date -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Date:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="date" name="dateStr" [(ngModel)]="dateStr" style="height:35px;" class="form-control back" required>
                        </div>
                    </div>

                    <!-- Job Code -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Job Code:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="jobCode" [(ngModel)]="jobCode" style="height:35px;" class="form-control back" placeholder="Enter Job Code" required>
                        </div>
                    </div>

                    <!-- Subject -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Subject:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="subject" [(ngModel)]="subject" style="height:35px;" class="form-control back" placeholder="Enter Subject" required>
                        </div>
                    </div>

                    <!-- Employee Name -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Name:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="name" [(ngModel)]="name" style="height:35px;" class="form-control back" placeholder="Enter Employee Name" required>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Description:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="description" [(ngModel)]="description" style="height:35px;" class="form-control back" placeholder="Enter Description" required>
                        </div>
                    </div>

                    <!-- Module -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Module:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="module" [(ngModel)]="module" style="height:35px;" class="form-control back" placeholder="Enter Module">
                        </div>
                    </div>

                    <!-- Task -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Task:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" name="task" [(ngModel)]="task" style="height:35px;" class="form-control back" placeholder="Enter Task">
                        </div>
                    </div>

                    <!-- Hours -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Hours:</label>
                        </div>
                        <div class="col-sm-8">
                            <input type="number" name="hours" [(ngModel)]="hours" style="height:35px;" class="form-control back" required>
                        </div>
                    </div>

                    <!-- Stage -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Stage:</label>
                        </div>
                        <div class="col-sm-8">
                            <mat-select name="stage" [(ngModel)]="stage" class="form-control" placeholder="Select Stage" required>
                                <mat-option *ngFor="let st of stages" [value]="st">{{ st }}</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- Notes -->
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="control-label" style="margin-top:5px;">Notes:</label>
                        </div>
                        <div class="col-sm-8">
                            <textarea name="notes" [(ngModel)]="notes" class="form-control back" rows="3" placeholder="Enter Notes" style="resize: vertical;"></textarea>
                        </div>
                    </div>

                </div>
            </form>

            <mat-dialog-actions align="end" style="margin-top: 15px; padding-bottom: 15px;">
                <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 5px;">
                    <mat-icon>cancel</mat-icon> Close
                </button>
                <button mat-raised-button type="button" class="save" color="primary" (click)="save()" [disabled]="!hoursForm.valid">
                    <mat-icon>save</mat-icon> Save
                </button>
            </mat-dialog-actions>
            
        </div>
    </div>
</div>
