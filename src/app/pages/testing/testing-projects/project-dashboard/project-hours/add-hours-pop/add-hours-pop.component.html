<div class="NewHeader">
    <h1 mat-dialog-title style="color:white; margin: 0; text-align: center;">
        {{ isEditMode ? 'Edit TimeSheet' : 'Add TimeSheet' }}
    </h1>
</div>

<div mat-dialog-content style="padding: 20px 25px;">
    <form #hoursForm="ngForm">
        <!-- Date -->
        <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
            <div class="col-sm-3">
                <label class="control-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Date:</label>
            </div>
            <div class="col-sm-9">
                <input type="date" name="dateStr" [(ngModel)]="dateStr" style="height:35px;" class="form-control back" required>
            </div>
        </div>

        <!-- Employee Name -->
        <div class="row" style="margin-bottom: 20px; display: flex; align-items: center;">
            <div class="col-sm-3">
                <label class="control-label" style="font-weight: 500; margin: 0; white-space: nowrap;">Name:</label>
            </div>
            <div class="col-sm-9">
                <input type="text" name="name" [(ngModel)]="name" style="height:35px;" class="form-control back" placeholder="Enter Employee Name" required>
            </div>
        </div>

        <!-- Timesheet Entries Section -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px; margin-bottom: 10px;">
            <h3 style="margin: 0; font-size: 15px; font-weight: 600; color: #206095;">Timesheet Details</h3>
            <button mat-raised-button type="button" (click)="addRow()" style="background-color: #206095; color: white;">
                Add
            </button>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="timesheet-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Module</th>
                        <th style="width: 30%;">Task</th>
                        <th style="width: 15%;">Hours</th>
                        <th style="width: 25%;">Description</th>
                        <th style="width: 10%; text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let row of rows; let idx = index">
                        <td>
                            <input type="text" [name]="'module_' + idx" [(ngModel)]="row.module" class="form-control back table-input" placeholder="Module">
                        </td>
                        <td>
                            <mat-select [name]="'task_' + idx" [(ngModel)]="row.task" class="form-control back table-input" placeholder="Select Task" required style="height: 35px; line-height: 23px;">
                                <div style="padding: 8px; position: sticky; top: 0; background: white; z-index: 1;">
                                    <input type="text" [name]="'search_' + idx" class="form-control" placeholder="Search..." 
                                           [(ngModel)]="row.searchText" 
                                           [ngModelOptions]="{standalone: true}"
                                           (keydown)="$event.stopPropagation()"
                                           style="height: 30px; font-size: 12px;">
                                </div>
                                <mat-option *ngFor="let t of getFilteredTasks(row.searchText)" [value]="t">
                                    {{ t }}
                                </mat-option>
                            </mat-select>
                        </td>
                        <td>
                            <input type="number" [name]="'hours_' + idx" [(ngModel)]="row.hours" class="form-control back table-input" placeholder="Hours" required min="0.1">
                        </td>
                        <td>
                            <input type="text" [name]="'desc_' + idx" [(ngModel)]="row.description" class="form-control back table-input" placeholder="Description" required>
                        </td>
                        <td style="text-align: center;">
                            <i class="fa fa-trash text-danger" style="cursor: pointer; font-size: 16px; margin-top: 8px;" (click)="deleteRow(idx)"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Dialog Actions -->
        <div style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 10px;">
            <button mat-raised-button type="button" (click)="close()" style="background-color: lightgray; color: red">
                <mat-icon>cancel</mat-icon> Close
            </button>
            <button mat-raised-button type="button" color="primary" (click)="save()" [disabled]="!hoursForm.valid">
                <mat-icon>save</mat-icon> Save
            </button>
        </div>
    </form>
</div>
