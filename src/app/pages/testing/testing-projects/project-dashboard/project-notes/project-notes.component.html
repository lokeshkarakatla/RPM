<div class="page-container" style="margin-left: -15px;">

  <!-- Header Section with Buttons -->
  <div class="header-section"
    style="display: flex; align-items: center; justify-content: flex-end; margin-bottom: 20px; width: 100%;">
    <div>
      <button mat-raised-button class="custom-back-btn" (click)="goBack()"
        style="background-color: rgb(130, 130, 130); color: white;">
        <mat-icon style="margin-bottom: -4px;">arrow_back</mat-icon> Back
      </button>
    </div>
  </div>

  <div class="content-wrapper" style="margin-left: 0px; width: 100%;">

    <!-- Add Note Card (Bootstrap styles matching current design) -->
    <mat-card class="add-note-card" appearance="outlined"
      style="margin-bottom: 25px; border-radius: 8px; border: 1px solid #cbd5e1; background: white;">
      <mat-card-header style="padding: 15px 20px; border-bottom: 1px solid #e2e8f0; background: #f8fafc;">
        <mat-card-title style="margin: 0; font-size: 16px; font-weight: 600; color: #1e293b;">Add Note</mat-card-title>
      </mat-card-header>

      <mat-card-content style="padding: 20px;">
        <div class="form-container" style="display: flex; gap: 15px; align-items: center; width: 100%;">

          <!-- Select Tag (Bootstrap class form-control) -->
          <div style="width: 220px;">
            <mat-select [(value)]="selectedTag" placeholder="Select Tag*" class="form-control"
              style="line-height: 24px; height: 38px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 4px; background-color: white;">
              <mat-option *ngFor="let tag of availableTags" [value]="tag">
                {{ tag }}
              </mat-option>
            </mat-select>
          </div>

          <!-- Enter text (Bootstrap class form-control) -->
          <div style="flex: 1;">
            <input type="text" [(ngModel)]="noteText" placeholder="Enter text*" class="form-control"
              style="height: 38px; border: 1px solid #cbd5e1; border-radius: 4px; padding: 6px 12px; width: 100%; background-color: white;">
          </div>

          <!-- Actions toolbar -->
          <div style="display: flex; align-items: center; gap: 8px; white-space: nowrap;">
            <button mat-icon-button aria-label="Attach document" (click)="uploaddoc(null)" matTooltip="Attach Document"
              style="width: 38px; height: 38px; border: 1px solid #cbd5e1; border-radius: 4px; background: white;">
              <mat-icon style="color: #475569; margin-top: -2px;">attach_file</mat-icon>
            </button>

            <button mat-icon-button aria-label="Clear" (click)="clearForm()" matTooltip="Clear"
              style="width: 38px; height: 38px; border: 1px solid #cbd5e1; border-radius: 4px; background: white;">
              <mat-icon style="color: #475569; margin-top: -2px;">refresh</mat-icon>
            </button>

            <button mat-mini-fab aria-label="Send" (click)="addNote()"
              style="background-color: #286ba5; color: white; width: 38px; height: 38px; border-radius: 4px; box-shadow: none;"
              matTooltip="Add Note">
              <mat-icon style="margin-top: -1px; margin-left: 1px;">send</mat-icon>
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- AI Overview -->
    <div class="ai-overview-header" style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
      <mat-icon class="sparkle-icon" style="color: #2563eb;">auto_awesome</mat-icon>
      <h3 style="margin: 0; font-size: 16px; font-weight: 600; color: #1e293b;">AI Overview</h3>
    </div>

    <!-- Notes Table View (Bootstrap styles matching Documents/Expenses) -->
    <div class="table-responsive" id="grid-table-container"
      style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; overflow: hidden; background: white;">
      <table mat-table [dataSource]="dataSource" class="table table-bordered table-hover"
        style="width: 100%; margin-bottom: 0;">

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-center" style="font-weight: 600; width: 100px;"> Actions
          </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <a style="cursor: pointer; margin-right: 10px;" matTooltip="Edit Note" (click)="editNote(element)">
              <i class="fa fa-edit" style="color: cornflowerblue; font-size: 16px;"></i>
            </a>
            <a style="cursor: pointer;" matTooltip="Delete Note" (click)="deleteNote(element)">
              <i class="fa fa-trash" style="color: red; font-size: 16px;"></i>
            </a>
          </td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef class="text-center" style="font-weight: 600; width: 120px;"> Date </th>
          <td mat-cell *matCellDef="let element" class="text-center"> {{element.date}} </td>
        </ng-container>

        <ng-container matColumnDef="postedBy">
          <th mat-header-cell *matHeaderCellDef class="text-center" style="font-weight: 600; width: 150px;"> Posted By
          </th>
          <td mat-cell *matCellDef="let element" class="text-center"> {{element.postedBy}} </td>
        </ng-container>

        <ng-container matColumnDef="message">
          <th mat-header-cell *matHeaderCellDef class="text-center" style="font-weight: 600;"> Description </th>
          <td mat-cell *matCellDef="let element" style="text-align: left; padding: 10px 15px;"> {{element.message}}
          </td>
        </ng-container>

        <ng-container matColumnDef="document">
          <th mat-header-cell *matHeaderCellDef class="text-center" style="font-weight: 600; width: 220px;"> Document
          </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <div *ngIf="element.document"
              style="display: flex; align-items: center; justify-content: center; gap: 8px;">
              <span style="font-weight: 500; color: #374151;">
                <!-- <i class="fa fa-file-pdf-o" style="margin-right: 5px; color: #dc2626;"></i>{{element.document}} -->
              </span>
              <a style="cursor: pointer;" matTooltip="View PDF" (click)="viewPdf(element.document)">
                <i class="fa fa-eye" style="color: black; font-size: 15px;"></i>
              </a>
              <a style="cursor: pointer;" matTooltip="Download PDF" (click)="downloadPdf(element.document)">
                <i class="fa fa-download" style="color: black; font-size: 15px;"></i>
              </a>
            </div>
            <span *ngIf="!element.document" style="color: #94a3b8;">-</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="tags">
          <th mat-header-cell *matHeaderCellDef class="text-center" style="font-weight: 600; width: 150px;"> Tags </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <span class="badge"
              style="background-color: #f1f5f9; color: #475569; padding: 5px 10px; border-radius: 4px; font-weight: 500; font-size: 11px; border: 1px solid #cbd5e1;">
              {{element.tags}}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-state-cell text-center" colspan="6" style="padding: 25px; color: #64748b;">No notes
            available</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 20, 50]" showFirstLastButtons aria-label="Select page"></mat-paginator>
    </div>

  </div>
</div>

<!-- Edit Note Template Dialog -->
<ng-template #editNoteDialog>
  <div class="NewHeader">
    <h3 style="padding-top:10px; margin: 0; color: white; text-align: center;">
      Edit Note
    </h3>
  </div>

  <div mat-dialog-content class="custom-dialog-content pt-2" style="padding: 20px 25px;">
    <form class="layout-container" style="display: flex; flex-direction: column; gap: 15px; width: 450px;">

      <!-- Select Tag Row -->
      <div class="row align-items-center" style="display: flex; align-items: center; width: 100%;">
        <div class="col-sm-4 text-end">
          <label style="font-weight: 500; margin: 0; white-space: nowrap;">Select Tag:<span
              style="color: red;">*</span></label>
        </div>
        <div class="col-sm-8">
          <mat-select [(value)]="editSelectedTag" placeholder="Select Tag*" class="form-control"
            style="line-height: 24px; height: 38px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 4px; background-color: #fefec4;">
            <mat-option *ngFor="let tag of availableTags" [value]="tag">
              {{ tag }}
            </mat-option>
          </mat-select>
        </div>
      </div>

      <!-- Description Row -->
      <div class="row" style="display: flex; align-items: flex-start; width: 100%;">
        <div class="col-sm-4 text-end" style="padding-top: 6px;">
          <label style="font-weight: 500; margin: 0; white-space: nowrap;">Description:<span
              style="color: red;">*</span></label>
        </div>
        <div class="col-sm-8">
          <textarea [(ngModel)]="editNoteText" name="editNoteText" placeholder="Enter text*" class="form-control"
            rows="4"
            style="border: 1px solid #cbd5e1; border-radius: 4px; padding: 6px 12px; width: 100%; background-color: #fefec4; resize: vertical;"></textarea>
        </div>
      </div>

    </form>
  </div>

  <div style="display: flex !important; justify-content: flex-end !important; gap: 10px !important; border-top: 1px solid #cbd5e1 !important; margin-top: 15px !important; padding: 15px 25px !important; width: 100% !important; box-sizing: border-box !important;">
    <button mat-raised-button class="close-btn" (click)="closeEditDialog()"
      style="background-color: lightgray !important; color: red !important; height: 38px !important; display: inline-flex !important; align-items: center !important; justify-content: center !important;">
      <mat-icon style="margin-right: 4px !important;">cancel</mat-icon> Close
    </button>
    <button mat-raised-button color="primary" class="save-btn" (click)="saveEditDialog()" style="height: 38px !important; display: inline-flex !important; align-items: center !important; justify-content: center !important;">
      Save <mat-icon style="margin-left: 5px !important;">save</mat-icon>
    </button>
  </div>
</ng-template>
