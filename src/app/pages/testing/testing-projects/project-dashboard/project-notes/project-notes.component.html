<div class="page-container">

  <div class="back-btn-wrapper">
    <button mat-raised-button class="custom-back-btn" (click)="goBack()">
      <mat-icon style="margin-top:4px">arrow_back</mat-icon> Back 
    </button>
  </div>

  <div class="content-wrapper" style="margin-left: -17px; width:90%">
    
    <mat-card class="add-note-card" appearance="outlined">
      <mat-card-header>
        <mat-card-title>Add Note</mat-card-title>
      </mat-card-header>
      
      <mat-card-content>
        <div class="form-container">
          <mat-form-field appearance="fill" class="tag-select">
            <mat-label>Notes Types*</mat-label>
            <mat-select>
              <mat-option *ngFor="let tag of availableTags" [value]="tag">
                {{ tag }}
              </mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="fill" class="text-input">
            <mat-label>Enter text*</mat-label>
            <input matInput placeholder="Enter text*">
          </mat-form-field>

          <div class="action-buttons">
            <button mat-icon-button aria-label="Attach document" (click)="uploaddoc(null)">
              <mat-icon>attach_file</mat-icon>
            </button>
            
            <button mat-mini-fab class="custom-fab refresh-btn" aria-label="Refresh">
              <mat-icon>refresh</mat-icon>
            </button>
            
            <button mat-mini-fab class="custom-fab send-btn" aria-label="Send">
              <mat-icon>send</mat-icon>
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <div class="ai-overview-header">
      <mat-icon class="sparkle-icon">auto_awesome</mat-icon>
      <h3>AI Overview</h3>
    </div>

    <div class="table-container mat-elevation-z1">
      <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Actions </th>
          <td mat-cell *matCellDef="let element"> {{element.actions}} </td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Date </th>
          <td mat-cell *matCellDef="let element"> {{element.date}} </td>
        </ng-container>

        <ng-container matColumnDef="postedBy">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Posted By </th>
          <td mat-cell *matCellDef="let element"> {{element.postedBy}} </td>
        </ng-container>

        <ng-container matColumnDef="message">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Message </th>
          <td mat-cell *matCellDef="let element"> {{element.message}} </td>
        </ng-container>

        <ng-container matColumnDef="document">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Document </th>
          <td mat-cell *matCellDef="let element"> {{element.document}} </td>
        </ng-container>

        <ng-container matColumnDef="tags">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Tags </th>
          <td mat-cell *matCellDef="let element"> {{element.tags}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-state-cell" colspan="6" class="text-center">No data available</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 20, 50]" showFirstLastButtons aria-label="Select page"></mat-paginator>
    </div>

  </div>
</div>
