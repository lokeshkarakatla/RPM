<div class="main-wrapper">
  <div class="header-section">
    <div class="title-row">
      <div class="header-titles" style="visibility: hidden;">
        <h1 style="font-weight: 700; font-size: 24px">
          Photos (NextGen Assembly Line-2026/MFG/011)
        </h1>
        <p class="subtitle">
          Track, upload, and organize all project site photos.
        </p>
      </div>

      <div class="header-actions">
         <button mat-raised-button class="back-btn" (click)="goBack()" style="background-color: rgb(130, 130, 130); color: white;">
    <mat-icon>arrow_back</mat-icon>
    Back
  </button>
      </div>
    </div>
  </div>

  <div class="toolbar-actions">
    <button mat-raised-button class="filter-btn" (click)="toggleFilter()">
      <mat-icon>filter_list</mat-icon> Filter
    </button>
    <button mat-raised-button class="add-btn" (click)="Addphoto(null)">
      <mat-icon>image</mat-icon> Add Photo
    </button>
  </div>

  <div *ngIf="showFilter" class="filter-panel">
    <mat-card class="filter-card">
      <mat-card-content>
        <div class="row align-items-center">
          <div class="col-sm-4">
            <label><b>Select Module:</b></label>
            <mat-select class="form-control" placeholder="Select Module">
              <mat-option value="1">Module 1</mat-option>
              <mat-option value="2">Module 2</mat-option>
            </mat-select>
          </div>
          <div class="col-sm-4">
            <label><b>Select Stage:</b></label>
            <mat-select class="form-control" placeholder="Select Stage">
              <mat-option value="1">Stage 1</mat-option>
              <mat-option value="2">Stage 2</mat-option>
            </mat-select>
          </div>
          <div class="col-sm-4 text-right">
            <button mat-raised-button class="btn-default" (click)="toggleFilter()"><mat-icon>close</mat-icon> Close</button>
            <button mat-raised-button color="primary"><mat-icon>search</mat-icon> Search</button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="gallery-grid">
    <mat-card class="photo-card" *ngFor="let photo of photoList">
      <div class="card-header-actions">
        <mat-icon class="action-icon edit-icon" matTooltip="Edit">edit</mat-icon>
        <mat-icon class="action-icon delete-icon" matTooltip="Delete">delete</mat-icon>
      </div>
      <div class="img-container">
        <img [src]="photo.url" [alt]="photo.title">
      </div>
      <div class="photo-title">{{ photo.title }}</div>
      <div class="photo-desc">{{ photo.description }}</div>
    </mat-card>
  </div>
</div>
