<div class="main-wrapper" style="padding: 0 10px; box-sizing: border-box;">
  <!-- Header Section with Buttons -->
  <div class="header-section"
    style="display: flex; align-items: center; justify-content: flex-end; margin-bottom: 20px; width: 100%;">
    <div style="display: flex; gap: 10px;">
      <button mat-raised-button (click)="Addphoto(null)" style="background-color: #286ba5; color: white; height: 38px;">
        <mat-icon>image</mat-icon> Add Photo
      </button>
      <button mat-raised-button (click)="toggleFilter()" style="background-color: black; color: white; height: 38px;">
        <mat-icon>filter_list</mat-icon> Filter
      </button>
      <button mat-raised-button (click)="goBack()" style="background-color: rgb(130, 130, 130); color: white; height: 38px;">
        <mat-icon>arrow_back</mat-icon> Back
      </button>
    </div>
  </div>

  <div *ngIf="showFilter" style="margin-bottom: 15px; width: 100%;">
    <mat-card class="filter" style="width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; background: white;">
      <mat-card-content style="padding: 15px;">
        <div style="display: flex; align-items: center; width: 100%; gap: 20px; box-sizing: border-box;">
          <!-- Module Field -->
          <div style="display: flex; align-items: center; gap: 10px; flex: 1; box-sizing: border-box;">
            <b style="white-space: nowrap; font-size: 13px; color: #475569;">Select Module:</b>
            <mat-select class="form-control" placeholder="Select Module" style="display: inline-flex; align-items: center; height: 36px; padding: 0 10px; flex-grow: 1; box-sizing: border-box;">
              <mat-option value="1">Module 1</mat-option>
              <mat-option value="2">Module 2</mat-option>
            </mat-select>
          </div>

          <!-- Stage Field -->
          <div style="display: flex; align-items: center; gap: 10px; flex: 1; box-sizing: border-box;">
            <b style="white-space: nowrap; font-size: 13px; color: #475569;">Select Stage:</b>
            <mat-select class="form-control" placeholder="Select Stage" style="display: inline-flex; align-items: center; height: 36px; padding: 0 10px; flex-grow: 1; box-sizing: border-box;">
              <mat-option value="1">Stage 1</mat-option>
              <mat-option value="2">Stage 2</mat-option>
            </mat-select>
          </div>

          <!-- Actions & Close Button -->
          <div style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
            <button mat-raised-button color="primary" style="background-color: #286ba5; color: white; height: 36px; display: inline-flex; align-items: center;">
              <mat-icon style="font-size: 18px; width: 18px; height: 18px; line-height: 18px;">search</mat-icon> Search
            </button>
            <button mat-raised-button class="btn-default" (click)="toggleFilter()" style="height: 36px; background-color: #cbd5e1; display: inline-flex; align-items: center;">
              <mat-icon style="font-size: 18px; width: 18px; height: 18px; line-height: 18px;">settings_backup_restore</mat-icon> Clear
            </button>
            <a (click)="toggleFilter()" style="font-size: 25px; cursor: pointer; color: #333; margin-left: 5px; display: flex; align-items: center;">
              <i class="fa fa-angle-double-up" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="gallery-grid" cdkDropList cdkDropListOrientation="horizontal" (cdkDropListDropped)="drop($event)" style="width: 100%;">
    <mat-card class="photo-card" *ngFor="let photo of photoList; let i = index" cdkDrag>
      <div class="card-header-actions">
        <i class="fa fa-pencil text-primary action-icon" matTooltip="Edit" (click)="Addphoto(photo); $event.stopPropagation()"></i>
        <i class="fa fa-trash text-danger action-icon" matTooltip="Delete" (click)="deletePhoto(i); $event.stopPropagation()"></i>
      </div>
      <div class="img-container">
        <img [src]="photo.url" [alt]="photo.title">
      </div>
      <div class="photo-title">{{ photo.title }}</div>
      <div class="photo-desc">{{ photo.description }}</div>
    </mat-card>
  </div>
</div>
