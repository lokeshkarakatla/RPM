<div class="NewHeader">
  <h3 style="padding-top:10px;">Add Resource</h3>
</div>

<div style="padding: 15px 20px;">
  <form style="padding: 10px 0;">
    <div class="row" style="margin-bottom: 15px; display: flex; align-items: center;">
      <div class="col-sm-4">
        <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Resource Code:</label>
      </div>
      <div class="col-sm-8">
        <input type="text" style="height:35px;" class="form-control" [(ngModel)]="code" name="code" placeholder="e.g. RES014">
      </div>
    </div>

    <div class="row" style="margin-bottom: 15px; display: flex; align-items: center;">
      <div class="col-sm-4">
        <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Resource Name:</label>
      </div>
      <div class="col-sm-8">
        <input type="text" style="height:35px;" class="form-control" [(ngModel)]="name" name="name" placeholder="Enter Full Name">
      </div>
    </div>
  </form>

  <mat-dialog-actions align="end" style="margin-top: 15px; padding: 10px 0 0 0;">
    <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 8px;">
      <mat-icon>cancel</mat-icon> Close
    </button>
    <button mat-raised-button type="button" class="save" color="primary" (click)="save()">
      <mat-icon>save</mat-icon> Save
    </button>
  </mat-dialog-actions>
</div>
