<div class="dialog-container">

    <div class="header-section">
        <button mat-raised-button class="back-btn" (click)="goBack()" style="background-color: rgb(130, 130, 130); color: white;">
            <mat-icon>arrow_back</mat-icon>
            Back
        </button>
    </div>

    <div class="transfer-layout">

        <!-- Available Members -->
        <div class="list-panel">

            <div class="panel-header">
                <span>Available Members</span>
                <span class="count-badge">{{ availableMembers.length }}</span>
            </div>

            <div class="list-content">

                <div class="list-item" *ngFor="let member of availableMembers"
                    [class.selected]="selectedAvailable.includes(member)"
                    (click)="toggleSelection(member, selectedAvailable)">

                    <input type="checkbox" class="member-checkbox" [checked]="selectedAvailable.includes(member)">

                    <div class="avatar">
                        {{ getInitials(member) }}
                    </div>

                    <span class="member-name">
                        {{ member }}
                    </span>

                </div>

                <div *ngIf="availableMembers.length===0" class="empty-state">

                    No more available members.

                </div>

            </div>

        </div>

        <!-- Buttons -->
        <div class="action-controls">

            <button mat-flat-button class="action-btn add-btn" (click)="addMembers()"
                [disabled]="!selectedAvailable.length">

                <span>Add</span>

                <mat-icon>
                    chevron_right
                </mat-icon>

            </button>

            <button mat-flat-button class="action-btn remove-btn" (click)="removeMembers()"
                [disabled]="!selectedAssigned.length">

                <mat-icon>
                    chevron_left
                </mat-icon>

                <span>Remove</span>

            </button>

        </div>

        <!-- Assigned Members -->
        <div class="list-panel">

            <div class="panel-header assigned-header">

                <span>
                    Assigned Team
                </span>

                <span class="count-badge">
                    {{ assignedMembers.length }}
                </span>

            </div>

            <div class="list-content">

                <div class="list-item" *ngFor="let member of assignedMembers"
                    [class.selected]="selectedAssigned.includes(member)"
                    (click)="toggleSelection(member, selectedAssigned)">

                    <input type="checkbox" class="member-checkbox" [checked]="selectedAssigned.includes(member)">

                    <div class="avatar assigned-avatar">
                        {{ getInitials(member) }}
                    </div>

                    <span class="member-name">
                        {{ member }}
                    </span>

                </div>

                <div *ngIf="assignedMembers.length===0" class="empty-state">

                    No members assigned yet.

                </div>

            </div>

            <!-- Footer inside second panel -->

            <div class="panel-footer">

                <button mat-button class="close-btn" (click)="closeDialog()">

                    Cancel

                </button>

                <button mat-flat-button class="save-btn" (click)="save()">

                    Save Changes

                </button>

            </div>

        </div>

    </div>

</div>
