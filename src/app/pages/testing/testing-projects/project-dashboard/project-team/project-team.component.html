<div mat-dialog-content class="dialog-container">
    <div class="text-center header-section">
        <h2 class="assign-title">Assign Team Members</h2>
        <p class="assign-subtitle">Select and move members to build your project team.</p>
    </div>

    <div class="transfer-layout">
        <div class="list-panel">
            <div class="panel-header">
                <span>Available Members</span>
                <span class="count-badge">{{ availableMembers.length }}</span>
            </div>
            <div class="list-content">
                <div class="list-item" 
                     *ngFor="let member of availableMembers"
                     [class.selected]="selectedAvailable.includes(member)"
                     (click)="toggleSelection(member, selectedAvailable)">
                    <input type="checkbox" class="member-checkbox" [checked]="selectedAvailable.includes(member)">
                    <div class="avatar">{{ getInitials(member) }}</div>
                    <span class="member-name">{{ member }}</span>
                </div>
                <div *ngIf="availableMembers.length === 0" class="empty-state">
                    No more available members.
                </div>
            </div>
        </div>

        <div class="action-controls">
            <button mat-flat-button class="action-btn add-btn" 
                    (click)="addMembers()" [disabled]="!selectedAvailable.length">
                <span>Add</span>
                <mat-icon>chevron_right</mat-icon>
            </button>
            <button mat-flat-button class="action-btn remove-btn" 
                    (click)="removeMembers()" [disabled]="!selectedAssigned.length">
                <mat-icon>chevron_left</mat-icon> 
                <span>Remove</span>
            </button>
        </div>

        <div class="list-panel">
            <div class="panel-header assigned-header">
                <span>Assigned Team</span>
                <span class="count-badge">{{ assignedMembers.length }}</span>
            </div>
            <div class="list-content">
                <div class="list-item" 
                     *ngFor="let member of assignedMembers"
                     [class.selected]="selectedAssigned.includes(member)"
                     (click)="toggleSelection(member, selectedAssigned)">
                    <input type="checkbox" class="member-checkbox" [checked]="selectedAssigned.includes(member)">
                    <div class="avatar assigned-avatar">{{ getInitials(member) }}</div>
                    <span class="member-name">{{ member }}</span>
                </div>
                <div *ngIf="assignedMembers.length === 0" class="empty-state">
                    No members assigned yet.
                </div>
            </div>
        </div>
    </div>
</div>

<div mat-dialog-actions class="dialog-footer">
    <button mat-button class="close-btn" style="background-color: rgba(213, 211, 211, 0.733);">
        Cancel
    </button>
    <button mat-flat-button class="save-btn" (click)="save()">
        Save Changes
    </button>
</div>
