<div class="NewHeader">
  <h3 style="padding-top:10px;">{{ isEditMode ? 'Edit Todo' : 'Add Todo' }}</h3>
</div>

<div style="padding: 15px 20px;">
  <form style="padding: 10px 0;">
    <div class="row">
      <!-- Left Column -->
      <div class="col-sm-6">
        <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
          <div class="col-sm-4">
            <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Subject:</label>
          </div>
          <div class="col-sm-8">
            <input type="text" style="height:35px;" class="form-control" [(ngModel)]="todoData.subject" name="subject" placeholder="Enter Subject">
          </div>
        </div>

        <div class="row" style="margin-bottom: 12px; display: flex; align-items: flex-start;">
          <div class="col-sm-4" style="margin-top: 5px;">
            <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Description:</label>
          </div>
          <div class="col-sm-8">
            <textarea class="form-control" rows="3" [(ngModel)]="todoData.description" name="description" placeholder="Enter Description" style="resize: vertical;"></textarea>
          </div>
        </div>

        <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
          <div class="col-sm-4">
            <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Due Date:</label>
          </div>
          <div class="col-sm-8">
            <input type="date" style="height:35px;" class="form-control" [(ngModel)]="todoData.dueDate" name="dueDate">
          </div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="col-sm-6">
        <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
          <div class="col-sm-4">
            <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Role:</label>
          </div>
          <div class="col-sm-8">
            <input type="text" style="height:35px;" class="form-control" [(ngModel)]="todoData.role" name="role" placeholder="Enter Role">
          </div>
        </div>

        <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
          <div class="col-sm-4">
            <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Group:</label>
          </div>
          <div class="col-sm-8">
            <input type="text" style="height:35px;" class="form-control" [(ngModel)]="todoData.group" name="group" placeholder="Enter Group">
          </div>
        </div>

        <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
          <div class="col-sm-4">
            <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Site:</label>
          </div>
          <div class="col-sm-8">
            <input type="text" style="height:35px;" class="form-control" [(ngModel)]="todoData.site" name="site" placeholder="Enter Site">
          </div>
        </div>

        <div class="row" style="margin-bottom: 12px; display: flex; align-items: center;">
          <div class="col-sm-4">
            <label class="control-label" style="margin: 0; font-weight: 500; font-size: 13px;">Department:</label>
          </div>
          <div class="col-sm-8">
            <input type="text" style="height:35px;" class="form-control" [(ngModel)]="todoData.department" name="department" placeholder="Enter Department">
          </div>
        </div>
      </div>
    </div>
  </form>

  <mat-dialog-actions align="end" style="margin-top: 15px; padding: 10px 0 0 0;">
    <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 8px;">
      <mat-icon>cancel</mat-icon> Close
    </button>
    <button mat-raised-button type="button" class="save" color="primary" (click)="save()">
      <mat-icon>save</mat-icon> {{ isEditMode ? 'Update' : 'Save' }}
    </button>
  </mat-dialog-actions>
</div>
